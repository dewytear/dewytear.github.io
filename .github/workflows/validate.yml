name: validate

"on":
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # worklog-gate가 base 브랜치와의 diff를 계산
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/validate_all.py
      # 본문을 바꾸는 PR은 Work Log 신규 문서를 동반해야 한다 (CLAUDE.md 규칙 4)
      - if: github.event_name == 'pull_request'
        run: python tools/check_worklog.py --base "origin/${{ github.base_ref }}"
      # ?v 캐시 자산을 고친 PR은 index.html의 해당 ?v 상향을 동반해야 한다 (CLAUDE.md 배포)
      - if: github.event_name == 'pull_request'
        run: python tools/check_cachebuster.py --base "origin/${{ github.base_ref }}"
