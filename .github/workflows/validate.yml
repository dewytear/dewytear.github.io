name: validate

"on":
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # worklog-gate가 base 브랜치와의 diff를 계산
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/validate_all.py
      # AI 소비 계층(llms.txt·data/knowledge-graph.json·sitemap.xml)이 인덱스와
      # 어긋나면 실패 — 문서 추가/수정 후 build_ai_export.py 재실행을 강제 (stateless)
      - run: python tools/build_ai_export.py --check
      # 동봉 플러그인 tools 스냅샷이 source of truth(tools/)와 어긋나면 실패
      # (push·PR 양쪽 — stateless 정합 검사라 base diff 불필요)
      - if: github.event_name != 'pull_request'
        run: python tools/check_plugin_sync.py
      # PR에서는 정합 + 릴리스 규율(번들 변경 = plugin.json version 상향)까지 검사
      - if: github.event_name == 'pull_request'
        run: python tools/check_plugin_sync.py --base "origin/${{ github.base_ref }}"
      # 본문을 바꾸는 PR은 Work Log 신규 문서를 동반해야 한다 (CLAUDE.md 규칙 4)
      - if: github.event_name == 'pull_request'
        run: python tools/check_worklog.py --base "origin/${{ github.base_ref }}"
      # ?v 캐시 자산을 고친 PR은 index.html의 해당 ?v 상향을 동반해야 한다 (CLAUDE.md 배포)
      - if: github.event_name == 'pull_request'
        run: python tools/check_cachebuster.py --base "origin/${{ github.base_ref }}"
      # 새로 등재된 문서의 지식 관계를 5타입 다각도로 검토했는지 리뷰 신호로 띄운다
      # (비차단 — 관계는 본문 실재 시만 다는 것이라 강제 못 함; 로그 가시화용, always exit 0)
      - if: github.event_name == 'pull_request'
        run: python tools/check_relations_review.py --base "origin/${{ github.base_ref }}"

  # 도식 글자·경계 삐짐 정밀 검사 — validate_design의 순수 파이썬 게이트(하한 추정,
  # 확실한 초과만 ERROR)를 넘어, 실제 브라우저 렌더로 경계값까지 전수 확인한다.
  diagram-bounds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Serve, launch Chrome, check diagram bounds
        run: |
          python3 -m http.server 8799 >/dev/null 2>&1 &
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium)"
          echo "using browser: $CHROME"
          "$CHROME" --headless=new --remote-debugging-port=9333 --no-sandbox --disable-gpu about:blank >/dev/null 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:9333/json/version >/dev/null && break; sleep 1; done
          node tools/check_diagram_bounds.mjs
