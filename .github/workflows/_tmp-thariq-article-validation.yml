name: Temp Thariq article registration

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  register-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Register article, rebuild indexes, validate
        run: python3 tools/_tmp_register_thariq_article.py

      - name: Commit generated registration artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            list \
            tools/doc-entries.ko.json \
            data/knowledge-index.ko.json \
            data/knowledge-index.en.json \
            data/doc-dates.json \
            docs/ko/ai/map/ai-map \
            docs/en/ai/map/ai-map
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "chore(news): rebuild indexes and validate article [skip ci]"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

# synchronize trigger after default-branch workflow registration
