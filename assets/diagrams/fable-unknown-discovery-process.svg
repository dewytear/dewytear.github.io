<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">타릭의 unknown 발견 프로세스</title>
  <desc id="desc">구현 전 8개 패턴, 구현 중 1개 패턴, 구현 후 2개 패턴이 순환하며 unknown을 known으로 바꾸는 흐름.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1220"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12Z" fill="#f59e0b"/></marker>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#000" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1400" height="620" rx="28" fill="url(#bg)"/>
  <text x="54" y="58" fill="#f8fafc" font-size="30" font-weight="700" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">Unknown Discovery Loop</text>
  <text x="54" y="90" fill="#94a3b8" font-size="18" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">타릭의 11개 아티팩트는 구현 전·중·후에 서로 다른 unknown을 찾는다</text>
  <g filter="url(#s)"><rect x="48" y="125" width="810" height="380" rx="24" fill="#14213d" stroke="#60a5fa" stroke-width="2"/><rect x="885" y="125" width="220" height="380" rx="24" fill="#2d1f12" stroke="#f59e0b" stroke-width="2"/><rect x="1130" y="125" width="222" height="380" rx="24" fill="#16352c" stroke="#34d399" stroke-width="2"/></g>
  <text x="78" y="170" fill="#bfdbfe" font-size="20" font-weight="700" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">BEFORE · 구현 전</text>
  <text x="915" y="170" fill="#fde68a" font-size="20" font-weight="700" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">DURING</text>
  <text x="1160" y="170" fill="#a7f3d0" font-size="20" font-weight="700" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">AFTER</text>
  <g font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif" font-size="15">
    <g fill="#0f2748" stroke="#60a5fa"><rect x="78" y="205" width="170" height="64" rx="12"/><rect x="270" y="205" width="170" height="64" rx="12"/><rect x="462" y="205" width="170" height="64" rx="12"/><rect x="654" y="205" width="170" height="64" rx="12"/><rect x="78" y="315" width="170" height="64" rx="12"/><rect x="270" y="315" width="170" height="64" rx="12"/><rect x="462" y="315" width="170" height="64" rx="12"/><rect x="654" y="315" width="170" height="64" rx="12"/></g>
    <g fill="#dbeafe">
      <text x="163" y="233" text-anchor="middle">1 · Blindspot pass</text><text x="163" y="254" text-anchor="middle" fill="#93c5fd">질문 못한 제약</text>
      <text x="355" y="233" text-anchor="middle">2 · Teach unknowns</text><text x="355" y="254" text-anchor="middle" fill="#93c5fd">판단 어휘 학습</text>
      <text x="547" y="233" text-anchor="middle">3 · 4 directions</text><text x="547" y="254" text-anchor="middle" fill="#93c5fd">암묵 선호 외부화</text>
      <text x="739" y="233" text-anchor="middle">4 · Mock first</text><text x="739" y="254" text-anchor="middle" fill="#93c5fd">싼 실패로 검증</text>
      <text x="163" y="343" text-anchor="middle">5 · Brainstorm</text><text x="163" y="364" text-anchor="middle" fill="#93c5fd">개입 공간 확장</text>
      <text x="355" y="343" text-anchor="middle">6 · Interview</text><text x="355" y="364" text-anchor="middle" fill="#93c5fd">고가 결정부터 질문</text>
      <text x="547" y="343" text-anchor="middle">7 · Reference</text><text x="547" y="364" text-anchor="middle" fill="#93c5fd">의미·불변조건</text>
      <text x="739" y="343" text-anchor="middle">8 · Tweakable plan</text><text x="739" y="364" text-anchor="middle" fill="#93c5fd">결정 공간 검토</text>
    </g>
    <path d="M163 279 V300 H355 M355 279 V300 H547 M547 279 V300 H739" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="7 6"/>
