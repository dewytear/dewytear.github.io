  <g font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif"><rect x="915" y="238" width="160" height="104" rx="16" fill="#3a2608" stroke="#f59e0b"/><text x="995" y="273" text-anchor="middle" fill="#fde68a" font-size="16" font-weight="700">9 · Implementation</text><text x="995" y="296" text-anchor="middle" fill="#fde68a" font-size="16" font-weight="700">notes</text><text x="995" y="322" text-anchor="middle" fill="#fbbf24" font-size="13">이탈·가정·선택 기록</text></g>
  <g font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif"><rect x="1160" y="215" width="162" height="84" rx="14" fill="#123b31" stroke="#34d399"/><text x="1241" y="248" text-anchor="middle" fill="#d1fae5" font-size="15" font-weight="700">10 · Buy-in doc</text><text x="1241" y="272" text-anchor="middle" fill="#6ee7b7" font-size="13">조직 합의</text><rect x="1160" y="342" width="162" height="84" rx="14" fill="#123b31" stroke="#34d399"/><text x="1241" y="375" text-anchor="middle" fill="#d1fae5" font-size="15" font-weight="700">11 · Quiz me</text><text x="1241" y="399" text-anchor="middle" fill="#6ee7b7" font-size="13">사용자 이해·소유권</text></g>
  <path d="M858 315 H880" stroke="#f59e0b" stroke-width="4" marker-end="url(#arr)"/><path d="M1105 315 H1125" stroke="#f59e0b" stroke-width="4" marker-end="url(#arr)"/><path d="M1240 505 C1240 570, 390 585, 165 515" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arr)"/>
  <rect x="410" y="450" width="460" height="70" rx="18" fill="#1f2937" stroke="#64748b"/><text x="640" y="478" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">Unknown → Decision → Record → Shared Context</text><text x="640" y="502" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">첫 작업의 unknown을 다음 작업의 known으로 승격</text>
  <text x="700" y="600" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Pretendard, Noto Sans KR, Noto Sans CJK KR, Apple SD Gothic Neo, sans-serif">프로세스는 선형 완료가 아니라 반복 루프다. 구현 중 발견이 다음 탐색의 입력이 된다.</text>
</svg>