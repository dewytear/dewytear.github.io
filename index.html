        // ---- Search-field paddle drag ----
        // The field doubles as the Breakout paddle: grab it and slide left or
        // right. Click-to-focus and typing stay untouched — the drag only
        // engages after a clear horizontal pull (8px, more X than Y), and the
        // field glides back to center when you start typing.
        function paddleReset(){
            var field = document.querySelector('.search-field');
            // Mid-drag searches (e.g. the concept-catch game auto-searching a
            // caught word) must not yank the paddle out of the player's hand.
            if(field && field.classList.contains('dragging')){ return; }
            if(field && field.style.transform){
                field.classList.add('paddle-home');
                field.style.transform = '';
                setTimeout(function(){ field.classList.remove('paddle-home'); }, 320);
            }
        }
        function enableSearchPaddle(){
            var field = document.querySelector('.search-field');
            var screen = document.querySelector('.search-screen');
            if(!field || !screen){ return; }
            var drag = null, offset = 0;
            function clampBound(){
                var room = (screen.getBoundingClientRect().width - field.offsetWidth) / 2 - 12;
                return Math.max(0, room);
            }
            field.addEventListener('pointerdown', function(e){
                if(e.button !== undefined && e.button !== 0){ return; }
                drag = { startX: e.clientX, startY: e.clientY, base: offset, on: false, id: e.pointerId };
            });
            field.addEventListener('pointermove', function(e){
                if(!drag){ return; }
                var mx = e.clientX - drag.startX, my = e.clientY - drag.startY;
                if(!drag.on){
                    if(Math.abs(mx) < 8 || Math.abs(mx) <= Math.abs(my)){ return; }
                    drag.on = true;   // a real horizontal pull — engage the paddle
                    field.classList.add('dragging');
                    try{ field.setPointerCapture(drag.id); }catch(err){}
                }
                var b = clampBound();
                offset = Math.max(-b, Math.min(b, drag.base + mx));
                field.style.transform = offset ? 'translateX(' + offset + 'px)' : '';
                e.preventDefault();
            });
            function endDrag(){
                if(drag && drag.on){ field.classList.remove('dragging'); }
                drag = null;
            }
            field.addEventListener('pointerup', endDrag);
            field.addEventListener('pointercancel', endDrag);
        }

        // ---- Search-screen mini games ----
        // Four calm, decorative games share the canvas behind the search
        // field; Settings(searchGame) picks which one runs. Every game
        // self-terminates once its canvas leaves the DOM (no loop leaks)
        // and all are skipped for reduced motion.
        var SEARCH_GAME_ACTIVE = '';
        // Which game to run: the visitor's own pick (stored per browser)
        // wins; the owner's Settings choice is the default for new visitors.
        function currentGameMode(){
            var pick = '';
            try{ pick = localStorage.getItem('wikiGamePick') || ''; }catch(e){}
            var mode = pick || effSettings().searchGame || 'breakout';
            return SEARCH_GAMES[mode] ? mode : 'breakout';
        }
        function startSearchGame(){
            if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){ return; }
            var canvas = document.querySelector('.search-game');
            if(!canvas || !canvas.getContext){ return; }
            var mode = currentGameMode();
            SEARCH_GAME_ACTIVE = mode;
            SEARCH_GAMES[mode](canvas);
            markGameDock(mode);
        }
        // Visitor-facing switcher: swap the game in place. The old canvas is
        // replaced by a fresh clone, so the old loop sees isConnected=false
        // and stops itself; the picked game starts on the new canvas.
        function switchSearchGame(el){
            var mode = el.getAttribute('data-g');
            if(!SEARCH_GAMES[mode]){ return; }
            try{ localStorage.setItem('wikiGamePick', mode); }catch(e){}
            var old = document.querySelector('.search-game');
            if(old){
                var fresh = old.cloneNode(false);
                old.parentNode.replaceChild(fresh, old);
            }
            startSearchGame();
        }
        function markGameDock(mode){
            document.querySelectorAll('.game-dock button').forEach(function(b){
                b.classList.toggle('on', b.getAttribute('data-g') === mode);
            });
        }

        // Shared stage for the newer games: HiDPI sizing, self-termination,
        // theme color and the live paddle (search field) box.
        function gameStage(canvas){
            var ctx = canvas.getContext('2d');
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var st = { ctx: ctx, W: 0, H: 0, onResize: null };
            function resize(){
                // Size to the positioned ancestor (the absolute canvas's real
                // containing block) — in search view that's the whole card,
                // so the game field reaches up behind the title.
                var box = canvas.offsetParent || canvas.parentNode;
                var rect = box.getBoundingClientRect();
                st.W = rect.width; st.H = rect.height;
                canvas.width = st.W * dpr; canvas.height = st.H * dpr;
                canvas.style.width = st.W + 'px'; canvas.style.height = st.H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                if(st.onResize){ st.onResize(); }
            }
            st.gone = function(){
                if(!canvas.isConnected){ window.removeEventListener('resize', resize); return true; }
                return false;
            };
            st.accent = function(){
                return (getComputedStyle(document.body).getPropertyValue('--accent') || '#ff6600').trim();
            };
            st.paddle = function(){
                var field = document.querySelector('.search-field');
                if(!field){ return null; }
                var cr = canvas.getBoundingClientRect(), fr = field.getBoundingClientRect();
                return { x: fr.left - cr.left, y: fr.top - cr.top, w: fr.width, h: fr.height };
            };
            window.addEventListener('resize', resize);
            resize();
            return st;
        }
        var GAME_FONT = '"Pretendard Variable", Pretendard, sans-serif';
        // Reflect a ball out of an axis-aligned rect; returns true on hit.
        function reflectBall(ball, rx, ry, rw, rh){
            if(ball.x + ball.r < rx || ball.x - ball.r > rx + rw ||
               ball.y + ball.r < ry || ball.y - ball.r > ry + rh){ return false; }
            var overL = (ball.x + ball.r) - rx, overR = (rx + rw) - (ball.x - ball.r);
            var overT = (ball.y + ball.r) - ry, overB = (ry + rh) - (ball.y - ball.r);
            if(Math.min(overL, overR) < Math.min(overT, overB)){
                ball.vx = overL < overR ? -Math.abs(ball.vx) : Math.abs(ball.vx);
            } else {
                ball.vy = overT < overB ? -Math.abs(ball.vy) : Math.abs(ball.vy);
            }
            return true;
        }
        // Paddle "english": where the ball lands on the paddle steers it.
        function paddleEnglish(ball, p){
            var t = (ball.x - (p.x + p.w / 2)) / (p.w / 2);
            t = Math.max(-1, Math.min(1, t));
            var sp = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            ball.vx = sp * 0.75 * t;
            ball.vy = -Math.sqrt(Math.max(sp * sp - ball.vx * ball.vx, sp * sp * 0.2));
        }
        function drawBallTrail(ctx, col, ball, trail){
            trail.push({ x: ball.x, y: ball.y });
            if(trail.length > 12){ trail.shift(); }
            for(var t = 0; t < trail.length; t++){
                ctx.globalAlpha = (t / trail.length) * 0.22;
                ctx.fillStyle = col;
                ctx.beginPath();
                ctx.arc(trail[t].x, trail[t].y, ball.r * (0.4 + 0.5 * t / trail.length), 0, 6.2832);
                ctx.fill();
            }
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = col;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, 6.2832);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        var SEARCH_GAMES = {};

        // ① 벽돌깨기 (기본) — the original calm Breakout.
        SEARCH_GAMES.breakout = function(canvas){
            var ctx = canvas.getContext('2d');
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var W = 0, H = 0, bricks = [], ball, trail = [];

            function accent(){
                return (getComputedStyle(document.body).getPropertyValue('--accent') || '#ff6600').trim();
            }
            function layoutBricks(){
                bricks = [];
                var cols = Math.max(6, Math.floor(W / 96));
                var rows = 3, pad = 12;
                var bw = (W - pad * (cols + 1)) / cols, bh = 15;
                var top = Math.max(46, H * 0.13);
                for(var r = 0; r < rows; r++){
                    for(var c = 0; c < cols; c++){
                        bricks.push({ x: pad + c * (bw + pad), y: top + r * (bh + pad),
                                      w: bw, h: bh, alive: true, flash: 0 });
                    }
                }
            }
            function resetBall(){
                var sp = Math.max(2.4, W / 520);
                var dir = Math.random() < 0.5 ? -1 : 1;
                ball = { x: W / 2, y: H * 0.62, vx: sp * 0.8 * dir, vy: -sp, r: Math.max(5, W / 240) };
            }
            function resize(){
                // Positioned ancestor = the search backdrop's containing
                // block — in search view that's the whole card.
                var box = canvas.offsetParent || canvas.parentNode;
                var rect = box.getBoundingClientRect();
                W = rect.width; H = rect.height;
                canvas.width = W * dpr; canvas.height = H * dpr;
                canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                layoutBricks();
                if(!ball || ball.x > W || ball.y > H){ resetBall(); }
            }
            // Reflect the ball out of an axis-aligned rect; returns true on hit.
            function bounce(rx, ry, rw, rh){
                if(ball.x + ball.r < rx || ball.x - ball.r > rx + rw ||
                   ball.y + ball.r < ry || ball.y - ball.r > ry + rh){ return false; }
                var overL = (ball.x + ball.r) - rx, overR = (rx + rw) - (ball.x - ball.r);
                var overT = (ball.y + ball.r) - ry, overB = (ry + rh) - (ball.y - ball.r);
                var minX = Math.min(overL, overR), minY = Math.min(overT, overB);
                if(minX < minY){
                    ball.vx = overL < overR ? -Math.abs(ball.vx) : Math.abs(ball.vx);
                } else {
                    ball.vy = overT < overB ? -Math.abs(ball.vy) : Math.abs(ball.vy);
                }
                return true;
            }
            resize();
            resetBall();
            window.addEventListener('resize', resize);

            function frame(){
                if(!canvas.isConnected){ window.removeEventListener('resize', resize); return; }
                ctx.clearRect(0, 0, W, H);
                var col = accent();

                ball.x += ball.vx; ball.y += ball.vy;
                if(ball.x - ball.r < 0){ ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
                if(ball.x + ball.r > W){ ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
                if(ball.y - ball.r < 0){ ball.y = ball.r; ball.vy = Math.abs(ball.vy); }
                if(ball.y + ball.r > H){ ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy); }

                // The search field is the paddle. Like real Breakout, WHERE
                // the ball lands on the paddle steers it: center = straight
                // up, edges = sharp angles ("english"). Speed stays constant.
                var field = document.querySelector('.search-field');
                if(field){
                    var cr = canvas.getBoundingClientRect(), fr = field.getBoundingClientRect();
                    var px = fr.left - cr.left, py = fr.top - cr.top;
                    if(bounce(px, py, fr.width, fr.height) && ball.vy < 0){
                        var t = (ball.x - (px + fr.width / 2)) / (fr.width / 2);
                        t = Math.max(-1, Math.min(1, t));
                        var sp = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                        ball.vx = sp * 0.75 * t;
                        ball.vy = -Math.sqrt(Math.max(sp * sp - ball.vx * ball.vx,
                                                      sp * sp * 0.2));
                    }
                }

                var anyAlive = false;
                for(var i = 0; i < bricks.length; i++){
                    var b = bricks[i];
                    if(b.flash > 0){ b.flash -= 0.06; }
                    if(b.alive){
                        anyAlive = true;
                        if(bounce(b.x, b.y, b.w, b.h)){ b.alive = false; b.flash = 1; }
                    }
                    if(b.alive || b.flash > 0){
                        ctx.globalAlpha = b.alive ? 0.15 : Math.max(0, b.flash) * 0.4;
                        ctx.fillStyle = col;
                        var pop = b.alive ? 0 : (1 - b.flash) * 4;
                        roundRect(ctx, b.x - pop, b.y - pop, b.w + pop * 2, b.h + pop * 2, 4);
                        ctx.fill();
                    }
                }
                if(!anyAlive){ layoutBricks(); }

                // Trail + ball.
                trail.push({ x: ball.x, y: ball.y });
                if(trail.length > 12){ trail.shift(); }
                for(var t = 0; t < trail.length; t++){
                    ctx.globalAlpha = (t / trail.length) * 0.22;
                    ctx.fillStyle = col;
                    ctx.beginPath();
                    ctx.arc(trail[t].x, trail[t].y, ball.r * (0.4 + 0.5 * t / trail.length), 0, 6.2832);
                    ctx.fill();
                }
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = col;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, 6.2832);
                ctx.fill();
                ctx.globalAlpha = 1;

                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        };

        // ② 개념 별똥별 받기 — concepts from the knowledge index drift down;
        // catch one with the paddle and it searches itself. Play = explore.
        SEARCH_GAMES.concept = function(canvas){
            var st = gameStage(canvas);
            var FALLBACK = ['스킬', '하네스', '오케스트레이터', '서브에이전트',
                            '세컨드브레인', '벡터검색', '지식그래프', 'CLAUDE.md'];
            var words = [], pops = [], lastSpawn = 0;
            function spawn(now){
                var pool = ALL_CONCEPTS.length ? ALL_CONCEPTS : FALLBACK;
                words.push({
                    text: pool[Math.floor(Math.random() * pool.length)],
                    x: 40 + Math.random() * Math.max(1, st.W - 80),
                    y: -16, vy: 0.35 + Math.random() * 0.4,
                    sway: Math.random() * 6.2832,
                    size: 13 + Math.random() * 6
                });
                lastSpawn = now;
            }
            function frame(now){
                if(st.gone()){ return; }
                var ctx = st.ctx; ctx.clearRect(0, 0, st.W, st.H);
                var col = st.accent();
                if(words.length < 6 && now - lastSpawn > 1500){ spawn(now); }
                var p = st.paddle();
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for(var i = words.length - 1; i >= 0; i--){
                    var w = words[i];
                    w.y += w.vy; w.sway += 0.02;
                    var wx = w.x + Math.sin(w.sway) * 14;
                    if(p && wx >= p.x - 8 && wx <= p.x + p.w + 8 &&
                       w.y >= p.y - 4 && w.y <= p.y + p.h){
                        // Caught: pop + search that concept.
                        pops.push({ x: wx, y: p.y, r: 6, a: 0.7 });
                        var box = document.getElementById('search-input');
                        if(box){ box.value = w.text; renderSearchResults(w.text); }
                        words.splice(i, 1);
                        continue;
                    }
                    if(w.y - w.size > st.H){ words.splice(i, 1); continue; }
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = col;
                    ctx.font = '600 ' + w.size.toFixed(1) + 'px ' + GAME_FONT;
                    ctx.fillText(w.text, wx, w.y);
                }
                for(var j = pops.length - 1; j >= 0; j--){
                    var q = pops[j];
                    q.r += 1.8; q.a -= 0.03;
                    if(q.a <= 0){ pops.splice(j, 1); continue; }
                    ctx.globalAlpha = q.a;
                    ctx.strokeStyle = col; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(q.x, q.y, q.r, 0, 6.2832); ctx.stroke();
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        };

        // ③ 퐁 랠리 — an AI paddle up top returns your serves; the faint
        // number counts the rally. Miss (either side) and it resets.
        SEARCH_GAMES.pong = function(canvas){
            var st = gameStage(canvas);
            var ball = null, trail = [], rally = 0;
            var ai = { x: 0, y: 54, w: 150, h: 12 };
            function reset(){
                // Twice the Breakout pace — Pong wants snappy rallies.
                var sp = Math.max(4.8, st.W / 260);
                ball = { x: st.W / 2, y: st.H * 0.45,
                         vx: (Math.random() < 0.5 ? -1 : 1) * sp * 0.7,
                         vy: sp, r: Math.max(5, st.W / 240) };
            }
            st.onResize = function(){
                ai.w = Math.max(120, st.W * 0.14);
                if(!ball || ball.x > st.W || ball.y > st.H){ reset(); }
            };
            st.onResize();
            function frame(){
                if(st.gone()){ return; }
                var ctx = st.ctx; ctx.clearRect(0, 0, st.W, st.H);
                var col = st.accent();
                // AI tracks the ball with capped speed — keeps up with the
                // faster ball on normal returns but loses sharp-angle shots.
                var maxV = Math.max(3.4, st.W / 300);
                ai.x += Math.max(-maxV, Math.min(maxV, (ball.x - ai.w / 2) - ai.x));
                ai.x = Math.max(8, Math.min(st.W - ai.w - 8, ai.x));
                ball.x += ball.vx; ball.y += ball.vy;
                if(ball.x - ball.r < 0){ ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
                if(ball.x + ball.r > st.W){ ball.x = st.W - ball.r; ball.vx = -Math.abs(ball.vx); }
                if(ball.y - ball.r < 0){ ball.y = ball.r; ball.vy = Math.abs(ball.vy); rally = 0; }
                if(ball.y + ball.r > st.H){ ball.y = st.H - ball.r; ball.vy = -Math.abs(ball.vy); rally = 0; }
                if(reflectBall(ball, ai.x, ai.y, ai.w, ai.h) && ball.vy > 0){ rally++; }
                var p = st.paddle();
                if(p && reflectBall(ball, p.x, p.y, p.w, p.h) && ball.vy < 0){
                    paddleEnglish(ball, p); rally++;
                }
                if(rally > 1){
                    ctx.globalAlpha = 0.08;
                    ctx.fillStyle = col;
                    ctx.font = '800 120px ' + GAME_FONT;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(rally, st.W / 2, st.H * 0.42);
                }
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = col;
                roundRect(ctx, ai.x, ai.y, ai.w, ai.h, 6);
                ctx.fill();
                drawBallTrail(ctx, col, ball, trail);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        };

        // ④ 종이비행기 글라이딩 — click the empty background (or press
        // Space/↑ outside the input) to lift the plane through the gates.
        // A brush against a gate just fades and restarts; nothing harsh.
        SEARCH_GAMES.plane = function(canvas){
            var st = gameStage(canvas);
            var screen = canvas.parentNode;
            var plane, gates, tick, crashed, score;
            function reset(){ plane = { x: st.W * 0.28, y: st.H * 0.4, vy: 0 };
                              gates = []; tick = 0; crashed = 0; score = 0; }
            reset();
            function flap(){ if(!crashed){ plane.vy = -3.2; } }
            function onDown(e){
                if(!e.target.closest('.search-core') && !e.target.closest('.game-dock')){ flap(); }
            }
            function onKey(e){
                if(e.target && e.target.id === 'search-input'){ return; }
                if(e.code === 'Space' || e.code === 'ArrowUp'){ flap(); e.preventDefault(); }
            }
            screen.addEventListener('pointerdown', onDown);
            window.addEventListener('keydown', onKey);
            function frame(){
                if(st.gone()){
                    screen.removeEventListener('pointerdown', onDown);
                    window.removeEventListener('keydown', onKey);
                    return;
                }
                var ctx = st.ctx; ctx.clearRect(0, 0, st.W, st.H);
                var col = st.accent();
                tick++;
                if(crashed > 0){
                    crashed--;
                    if(crashed === 0){ reset(); }
                } else {
                    plane.vy = Math.min(plane.vy + 0.09, 4);
                    plane.y += plane.vy;
                    if(plane.y < 18){ plane.y = 18; plane.vy = 0; }
                    if(plane.y > st.H - 18){ plane.y = st.H - 18; plane.vy = -1; }
                    if(tick % 170 === 0){
                        var gapH = Math.max(150, st.H * 0.3);
                        gates.push({ x: st.W + 40, w: 26, gapH: gapH,
                                     gapY: 70 + Math.random() * Math.max(1, st.H - gapH - 160),
                                     passed: false });
                    }
                    var speed = Math.max(1.4, st.W / 700);
                    for(var i = gates.length - 1; i >= 0; i--){
                        var g = gates[i];
                        g.x -= speed;
                        if(g.x + g.w < -20){ gates.splice(i, 1); continue; }
                        if(plane.x + 11 > g.x && plane.x - 11 < g.x + g.w){
                            if(plane.y < g.gapY || plane.y > g.gapY + g.gapH){ crashed = 40; }
                            else if(!g.passed){ g.passed = true; score++; }
                        }
                    }
                }
                gates.forEach(function(g){
                    ctx.globalAlpha = 0.14;
                    ctx.fillStyle = col;
                    roundRect(ctx, g.x, -8, g.w, g.gapY + 8, 10); ctx.fill();
                    roundRect(ctx, g.x, g.gapY + g.gapH, g.w, st.H - (g.gapY + g.gapH) + 8, 10); ctx.fill();
                });
                if(score > 0){
                    ctx.globalAlpha = 0.08;
                    ctx.fillStyle = col;
                    ctx.font = '800 120px ' + GAME_FONT;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(score, st.W / 2, st.H * 0.42);
                }
                if(tick < 300 && score === 0){
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = col;
                    ctx.font = '600 13px ' + GAME_FONT;
                    ctx.textAlign = 'center';
                    ctx.fillText('빈 곳을 클릭해 비행 ✈', st.W / 2, Math.max(30, st.H * 0.08));
                }
                // The plane: a folded-paper triangle tilted by its climb rate.
                var ang = Math.max(-0.5, Math.min(0.7, plane.vy * 0.09));
                ctx.save();
                ctx.translate(plane.x, plane.y);
                ctx.rotate(ang);
                ctx.globalAlpha = crashed ? Math.max(0.1, crashed / 40 * 0.7) : 0.7;
                ctx.fillStyle = col;
                ctx.beginPath();
                ctx.moveTo(23, 0); ctx.lineTo(-16, -12); ctx.lineTo(-7, 0); ctx.lineTo(-16, 12);
                ctx.closePath(); ctx.fill();
                ctx.globalAlpha *= 0.5;
                ctx.strokeStyle = col; ctx.lineWidth = 1.4;
                ctx.beginPath(); ctx.moveTo(23, 0); ctx.lineTo(-7, 0); ctx.stroke();
                ctx.restore();
                ctx.globalAlpha = 1;
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        };
        function roundRect(ctx, x, y, w, h, r){
            r = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // ---- "Recent docs" module: paginated board ----
        // Ordered by each doc's last commit date, fetched from the GitHub
        // API (cached for an hour). Until dates arrive, list order shows.
        var MORE_PAGE_SIZE = 5;
        var MORE_BLOCK = 7;    // page numbers shown per pager block (fits mobile width)
        var morePage = 0;
        var REPO_API = 'https://api.github.com/repos/dewytear/dewytear.github.io';
        var DOC_DATES_KEY = 'wikiDocDates.v1';

        function morePageCount(){
            return Math.max(1, Math.ceil(DOCS.length / MORE_PAGE_SIZE));
        }

        function renderMore(){
            var pages = morePageCount();
            if(morePage >= pages){ morePage = pages - 1; }
            var start = morePage * MORE_PAGE_SIZE;
            var html = '<h3 class="more-title">최근 문서</h3><ul class="more-list">';
            DOCS.slice(start, start + MORE_PAGE_SIZE).forEach(function(d){
                var meta = d.section + (d.date ? ' · ' + d.date.slice(0, 10) : '');
                html += '<li><a href="#!' + d.name + '">'
                     +  '<span class="more-name">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="more-meta">' + escapeHtml(meta) + '</span></a></li>';
            });
            html += '</ul>';
            if(pages > 1){
                // Numbered pager: seven pages per block, with side arrows that
                // jump a whole seven-page block at a time.
                var block = Math.floor(morePage / MORE_BLOCK);
                var first = block * MORE_BLOCK;
                var last = Math.min(first + MORE_BLOCK, pages);
                html += '<div class="more-nav">'
                     +  '<button class="more-arrow" onclick="moreBlock(-1)"'
                     +      (block === 0 ? ' disabled' : '') + ' aria-label="이전 7페이지">&laquo;</button>'
                     +  '<span class="more-pages">';
                for(var i = first; i < last; i++){
                    html += '<button class="more-page' + (i === morePage ? ' active' : '') + '"'
                         +  ' onclick="moreGoto(' + i + ')">' + (i + 1) + '</button>';
                }
                html += '</span>'
                     +  '<button class="more-arrow" onclick="moreBlock(1)"'
                     +      (last >= pages ? ' disabled' : '') + ' aria-label="다음 7페이지">&raquo;</button>'
                     +  '</div>';
            }
            return html;
        }

        function moreGoto(page){
            var pages = morePageCount();
            morePage = Math.max(0, Math.min(page, pages - 1));
            document.querySelector('#more').innerHTML = renderMore();
        }

        // Jump forward/back a full seven-page block, landing on its first page.
        function moreBlock(dir){
            var pages = morePageCount();
            var maxBlock = Math.floor((pages - 1) / MORE_BLOCK);
            var block = Math.floor(morePage / MORE_BLOCK) + dir;
            block = Math.max(0, Math.min(block, maxBlock));
            morePage = block * MORE_BLOCK;
            document.querySelector('#more').innerHTML = renderMore();
        }

        function loadCachedDocDates(){
            try{
                var s = JSON.parse(localStorage.getItem(DOC_DATES_KEY));
                if(s && Date.now() - s.at < 3600000){ return s.dates; }
            }catch(e){}
            return null;
        }

        function fetchDocDates(){
            var dates = {};
            return Promise.all(DOCS.map(function(d){
                var url = REPO_API + '/commits?path=' + encodeURIComponent(d.name) + '&per_page=1';
                return fetch(url).then(function(r){
                    return r.ok ? r.json() : null;
                }).then(function(j){
                    if(j && j[0]){ dates[d.name] = j[0].commit.committer.date; }
                }).catch(function(){});
            })).then(function(){
                if(Object.keys(dates).length){
                    try{
                        localStorage.setItem(DOC_DATES_KEY,
                            JSON.stringify({ at: Date.now(), dates: dates }));
                    }catch(e){}
                }
                return dates;
            });
        }

        function applyDocDates(dates){
            if(!dates || !Object.keys(dates).length){ return; }
            DOCS.forEach(function(d){ d.date = dates[d.name] || ''; });
            DOCS.sort(function(a, b){
                return a.date < b.date ? 1 : a.date > b.date ? -1 : 0;
            });
            morePage = 0;   // reordering restarts the board at page one
            document.querySelector('#more').innerHTML = renderMore();
        }

        function refreshRecentDocs(){
            var cached = loadCachedDocDates();
            if(cached){ applyDocDates(cached); }
            else { fetchDocDates().then(applyDocDates); }
        }

        function setOrClear(s, key, val){

        // Override the theme accent tokens per mode. Only valid #rrggbb values
        // (what <input type="color"> yields) are accepted; defaults emit no
        // override so style.css stays the single source of truth.
        function applyAccentVars(day, night){
            var HEX = /^#[0-9a-f]{6}$/i;
            var css = '';
            if(night && HEX.test(night) && night.toLowerCase() !== ACCENT_NIGHT_DEFAULT){
                css += ':root{--accent:' + night + ';--accent-ink:' + night + ';}';
            }
            if(day && HEX.test(day) && day.toLowerCase() !== ACCENT_DAY_DEFAULT){
                // Small-text ink is a darkened shade so contrast on white holds.
                css += 'body.day{--accent:' + day + ';'
                     + '--accent-ink:color-mix(in srgb,' + day + ' 78%, black);}';
            }
            var el = document.getElementById('theme-vars');
            if(!el){
                el = document.createElement('style');
                el.id = 'theme-vars';
                document.head.appendChild(el);
            }
            el.textContent = css;
        }

              + '<p class="settings-note">변경 내용은 이 브라우저에만 저장됩니다. 프로필 사진은 서버 설정에서 관리합니다.</p>'
              + '<div class="settings-tabs" role="tablist">'
              +   '<button type="button" id="settings-tab-basic" class="settings-tab'
              +     (SETTINGS_TAB === 'basic' ? ' active' : '') + '" role="tab"'
              +     ' aria-selected="' + (SETTINGS_TAB === 'basic') + '"'
              +     ' onclick="switchSettingsTab(\'basic\')">기본 설정</button>'
              +   '<button type="button" id="settings-tab-design" class="settings-tab'
              +     (SETTINGS_TAB === 'design' ? ' active' : '') + '" role="tab"'
              +     ' aria-selected="' + (SETTINGS_TAB === 'design') + '"'
              +     ' onclick="switchSettingsTab(\'design\')">디자인 설정</button>'
              + '</div>'
              + basic
              + design
              + '<div class="settings-actions">'
              +   '<button class="settings-save" onclick="saveSettingsForm()">저장</button>'
              +   '<button class="settings-reset" onclick="resetSettings()">기본값으로</button>'
              + '</div>'
              + '<p id="settings-msg" class="settings-msg" hidden></p>'
              + '<details class="settings-dump-wrap">'
              +   '<summary>이 브라우저의 현재 설정 값 보기 (진단)</summary>'
              +   '<div id="settings-dump"></div>'
              + '</details>';
            setArticle(html);
            renderCatTransfer();
            renderSettingsDump();
        }

        // ---- "이 브라우저의 현재 값" 진단 패널 ----
        // Settings live only in each visitor's browser (localStorage); this
        // panel makes them visible on the device itself — per key: the
        // effective value and where it comes from (개인 저장 > 사이트 기본 >
        // 앱 기본). The raw JSON (password masked) can be copied out.
        function renderSettingsDump(){
            var box = document.getElementById('settings-dump');
            if(!box){ return; }
            var personal = loadSettings();
            var eff = effSettings();
            var KEYS = ['theme', 'accentDay', 'accentNight', 'searchGame',
                        'navLineStyle', 'navLineWidth', 'hideRecent', 'hideRelated',
                        'music', 'title', 'tagline', 'photoLine', 'hiddenCats'];
            var rows = KEYS.map(function(k){
                var v = eff[k];
                var src = personal[k] !== undefined ? '개인 저장'
                        : SITE_DEFAULTS[k] !== undefined ? '사이트 기본'
                        : v !== undefined ? '앱 기본' : '—';
                var shown = v === undefined ? '—'
                          : Array.isArray(v) ? (v.length ? v.join(', ') : '(비어 있음)')
                          : String(v);
                return '<tr><td>' + k + '</td><td>' + escapeHtml(shown)
                     + '</td><td>' + src + '</td></tr>';
            });
            rows.push('<tr><td>password</td><td>' + (personal.password ? '(변경됨)' : '(기본)')
                    + '</td><td>' + (personal.password ? '개인 저장' : '앱 기본') + '</td></tr>');
            var pick = '', collapsed = '';
            try{ pick = localStorage.getItem('wikiGamePick') || ''; }catch(e){}
            try{ collapsed = localStorage.getItem('navCollapsed') || ''; }catch(e){}
            rows.push('<tr><td>wikiGamePick (게임 독 선택)</td><td>'
                    + (pick ? escapeHtml(pick) : '—') + '</td><td>'
                    + (pick ? '개인 저장' : '—') + '</td></tr>');
            rows.push('<tr><td>navCollapsed (메뉴 접힘)</td><td>'
                    + (collapsed === '' ? '—' : collapsed === '0' ? 'false' : 'true')
                    + '</td><td>' + (collapsed === '' ? '—' : '개인 저장') + '</td></tr>');
            var raw = {};
            Object.keys(personal).forEach(function(k){ raw[k] = personal[k]; });
            if(raw.password){ raw.password = '***'; }
            var json = JSON.stringify(raw, null, 1);
            box.innerHTML =
                '<div class="tbl-wrap"><table>'
              +   '<thead><tr><th>항목</th><th>적용 값</th><th>출처</th></tr></thead>'
              +   '<tbody>' + rows.join('') + '</tbody>'
              + '</table></div>'
              + '<label class="dump-raw-label">이 브라우저에 저장된 원본(JSON)</label>'
              + '<textarea id="settings-dump-raw" readonly rows="4">' + escapeHtml(json) + '</textarea>'
              + '<button type="button" class="color-reset" onclick="copySettingsDump()">복사</button>';
        }
        function copySettingsDump(){
            var ta = document.getElementById('settings-dump-raw');
            if(!ta){ return; }
            ta.select();
            try{
                if(navigator.clipboard){ navigator.clipboard.writeText(ta.value); }
                else { document.execCommand('copy'); }
                settingsMsg('설정 JSON을 복사했습니다.');
            }catch(e){ settingsMsg('복사에 실패했습니다. 직접 선택해 복사해 주세요.', true); }
        }

        // ---- Category transfer list (전체 ↔ 노출) ----
        function catSelect(li){ li.classList.toggle('sel'); }
        function renderCatTransfer(){
            var L = document.getElementById('cat-left'), R = document.getElementById('cat-right');
            if(!L || !R || !SETTINGS_CATS){ return; }
            L.innerHTML = SETTINGS_CATS.all.map(function(c){
                var on = SETTINGS_CATS.exposed.indexOf(c) !== -1;   // already exposed
                return '<li class="cat-item' + (on ? ' on' : '') + '" data-cat="'
                     + escapeHtml(c) + '" onclick="catSelect(this)">' + escapeHtml(c) + '</li>';
            }).join('');
            R.innerHTML = SETTINGS_CATS.exposed.map(function(c){
                return '<li class="cat-item" data-cat="' + escapeHtml(c)
                     + '" onclick="catSelect(this)">' + escapeHtml(c) + '</li>';
            }).join('');
        }
        function catMove(dir){
            if(!SETTINGS_CATS){ return; }
            var side = dir > 0 ? 'cat-left' : 'cat-right';
            var sel = [].map.call(document.querySelectorAll('#' + side + ' .cat-item.sel'),
                                  function(li){ return li.getAttribute('data-cat'); });
            if(dir > 0){
                sel.forEach(function(c){
                    if(SETTINGS_CATS.exposed.indexOf(c) === -1){ SETTINGS_CATS.exposed.push(c); }
                });
                // keep exposed in the original category order
                SETTINGS_CATS.exposed = SETTINGS_CATS.all.filter(function(c){
                    return SETTINGS_CATS.exposed.indexOf(c) !== -1;
                });
            } else {
                SETTINGS_CATS.exposed = SETTINGS_CATS.exposed.filter(function(c){
                    return sel.indexOf(c) === -1;
                });
            }
            renderCatTransfer();
            persistCats();   // apply + save live
        }
        function persistCats(){
            if(!SETTINGS_CATS){ return; }
            var s = loadSettings();
            s.hiddenCats = SETTINGS_CATS.all.filter(function(c){
                return SETTINGS_CATS.exposed.indexOf(c) === -1;
            });
            saveSettings(s);
            applyCategoryVisibility(s.hiddenCats);
        }

        function settingsMsg(text, isError){
            var el = document.getElementById('settings-msg');
            if(!el){ return; }
            el.textContent = text;
            el.hidden = false;
            el.classList.toggle('error', !!isError);
        }

        function saveSettingsForm(){
            var s = loadSettings();
            // Empty title = no override → fall back to config/default (so the
            // shown value matches the applied value on reopen).
            var titleVal = document.getElementById('settings-title').value.trim();
            if(titleVal){ s.title = titleVal; } else { delete s.title; }
            s.tagline = document.getElementById('settings-tagline').value;
            s.photoLine = document.getElementById('settings-photoline').value;
            // Design/feature fields store only deviations from the site
            // default, so config.json changes keep reaching this browser.
            setOrClear(s, 'music', document.getElementById('settings-music').value.trim());
            setOrClear(s, 'navLineStyle', document.getElementById('settings-navstyle').value);
            setOrClear(s, 'navLineWidth', document.getElementById('settings-navwidth').value);
            setOrClear(s, 'hideRecent', document.getElementById('settings-hiderecent').checked);
            setOrClear(s, 'hideRelated', document.getElementById('settings-hiderelated').checked);
            setOrClear(s, 'searchGame', document.getElementById('settings-game').value);
            // Accent overrides: the (site) default value = no override stored.
            var ad = document.getElementById('settings-accent-day').value;
            var an = document.getElementById('settings-accent-night').value;
            if(ad && ad.toLowerCase() !== accentDefault('day')){ s.accentDay = ad; } else { delete s.accentDay; }
            if(an && an.toLowerCase() !== accentDefault('night')){ s.accentNight = an; } else { delete s.accentNight; }
            if(SETTINGS_CATS){
                s.hiddenCats = SETTINGS_CATS.all.filter(function(c){
                    return SETTINGS_CATS.exposed.indexOf(c) === -1;
                });
            }
            var np = document.getElementById('settings-newpass').value;
            if(np){ s.password = np; }
            try{
                saveSettings(s);
                applySettings();   // also re-applies the music track
                document.getElementById('settings-newpass').value = '';
                settingsMsg(np ? '저장되었습니다. 암호가 변경되었습니다.' : '저장되었습니다.');
            }catch(e){
                settingsMsg('저장에 실패했습니다.', true);
            }
        }

        function resetSettings(){
            if(!window.confirm('타이틀·암호를 모두 기본값으로 되돌릴까요?')){ return; }
            localStorage.removeItem(SETTINGS_KEY);
            SETTINGS_UNLOCKED = false;
            location.reload();
        }

        // Mark the nav link for the doc on screen (null clears every mark).
        function markActiveNav(name){
            var nav = document.getElementById('navigation');
            if(!nav){ return; }
            var want = name ? '#!' + name : null;
            nav.querySelectorAll('a').forEach(function(a){
                a.classList.toggle('nav-active', a.getAttribute('href') === want);
            });
        }

        // ---- Router ----
        function route(){
            document.body.classList.remove('nav-open');   // close mobile drawer
            var h = location.hash;
            var path = h ? h.substr(2) : '';               // strip "#!"
            // Hide the "recent docs" module on the settings, tags and search screens.
            document.body.classList.toggle('settings-view', path === 'settings');
            document.body.classList.toggle('tags-view', path === 'tags');
            // The unified search screen is both the landing page (empty hash)
            // and the destination of the masthead title link (#!search).
            var isSearch = !h || path === 'search';
            document.body.classList.toggle('search-view', isSearch);
            document.body.classList.toggle('folder-view', path.indexOf('folder:') === 0);
            document.body.classList.toggle('cosmos-view', path === 'cosmos');
            // Work Log docs are dev journal: like tags, the "recent docs"
            // module stays out of them.
            var doc = DOC_BY_NAME[path];
            document.body.classList.toggle('worklog-view',
                !!(doc && doc.section.indexOf('Work Log') === 0));
            CURRENT_DOC = null;   // cleared here; fetchPage sets it for real docs
            if(isSearch){ showSearch(); markActiveNav(null); return; }
            if(path === 'cosmos'){ showCosmos(); markActiveNav(null); return; }
            if(path === 'tags'){ showTagIndex(); markActiveNav(null); }
            else if(path.indexOf('tag:') === 0){ showTag(decodeURIComponent(path.substr(4))); markActiveNav(null); }
            else if(path.indexOf('folder:') === 0){ showFolder(decodeURIComponent(path.substr(7))); markActiveNav(null); }
            else if(path === 'settings'){ openSettings(); markActiveNav(null); }
            else { fetchPage(path); markActiveNav(path); }
        }

        function toggleNav(){
            // Desktop: collapse/expand the sidebar column (default expanded;
            // the choice is remembered per browser). Mobile: slide the drawer.
            if(window.matchMedia && window.matchMedia('(min-width: 801px)').matches){
                var on = document.body.classList.toggle('nav-collapsed');
                try{ localStorage.setItem('navCollapsed', on ? '1' : '0'); }catch(e){}
            } else {
                document.body.classList.toggle('nav-open');
            }
        }

        function toggleBranch(btn){
            btn.parentNode.classList.toggle('collapsed');
        }

        function setAllBranches(collapsed){
            document.querySelectorAll('#navigation .nav-branch').forEach(function(li){
                li.classList.toggle('collapsed', collapsed);
            });
        }
        function expandAll(){ setAllBranches(false); }
        function collapseAll(){ setAllBranches(true); }

        // ---- Boot ----
        window.addEventListener('hashchange', route);
        // Repo config is the global source; local (localStorage) tweaks win on top.
        applyRepoConfig().then(applySettings);

        fetch('list').then(function(response){
            response.json().then(function(tree){
                buildIndexes(tree);
                document.querySelector('#navigation').innerHTML =
                    '<div class="nav-tools">'
                  + '<button type="button" class="nav-tool" onclick="expandAll()">모두 펼치기</button>'
                  + '<button type="button" class="nav-tool" onclick="collapseAll()">모두 접기</button>'
                  + '</div>'
                  + renderNodes(tree, []);
                applyCategoryVisibility(loadSettings().hiddenCats);   // nav now exists
                document.querySelector('#more').innerHTML = renderMore();
                refreshRecentDocs();   // reorder by last-modified once dates load
                route();   // render the initial page once indexes exist
            })
        })

        // Load the AI knowledge index (summaries·concepts·related). Non-blocking:
        // if a doc is already shown when it arrives, inject its related block.
        fetch('knowledge-index.json').then(function(r){ return r.json(); }).then(function(idx){
            KNOWLEDGE = {};
            (idx.docs || []).forEach(function(d){ KNOWLEDGE[d.name] = d; });
            KNOWLEDGE_STATS = idx.stats || null;
            buildConceptIndex();
            injectRelated();
            hydrateAiMap();
            // Concepts now available — re-rank any in-progress search.
            var box = document.getElementById('search-input');
            if(box && box.value.trim()){ renderSearchResults(box.value); }
        }).catch(function(){ KNOWLEDGE = {}; });

        // Accept a YouTube URL (watch / youtu.be / embed / shorts) or a raw
        // 11-char video id; return the id, or '' if it doesn't look like one.
        function parseYouTubeId(input){
            input = (input || '').trim();
            if(!input){ return ''; }
            var m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
            if(m){ return m[1]; }
            if(/^[A-Za-z0-9_-]{11}$/.test(input)){ return input; }
            return '';
        }

        // ---- Floating background music (YouTube IFrame API) ----
        (function(){
            var DEFAULT_ID = '08A9n8QyE3k';
            function resolveId(){
                try{ return parseYouTubeId((effSettings().music) || '') || DEFAULT_ID; }
                catch(e){ return DEFAULT_ID; }
            }
            var VIDEO_ID = resolveId();
            var VIDEO_URL = 'https://www.youtube.com/watch?v=' + VIDEO_ID;
            var player, ready = false, playing = false, wantPlay = false, failed = false;
            var btn = document.getElementById('music-btn');

            // If the API never loads (offline / blocked by an ad- or tracker
            // blocker), tell the user instead of leaving a dead button.
            var apiTimer = setTimeout(function(){
                if(!player){ fail('음악 로드 실패 (네트워크·차단기 확인)'); }
            }, 6000);

            var tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            tag.onerror = function(){ fail('음악 로드 실패 (네트워크·차단기 확인)'); };
            document.head.appendChild(tag);

            window.onYouTubeIframeAPIReady = function(){
                clearTimeout(apiTimer);
                player = new YT.Player('yt-music', {
                    // Real (off-screen) size — Safari refuses playback on a
                    // zero-size/hidden media element even after a user tap.
                    height: '200', width: '200', videoId: VIDEO_ID,
                    playerVars: { autoplay: 0, controls: 0, loop: 1,
                                  playlist: VIDEO_ID, playsinline: 1,
                                  origin: location.origin },
                    events: {
                        onReady: function(){
                            ready = true;
                            try{ player.setVolume(35); }catch(e){}
                            // Fallback for a tap that arrived before the player
                            // object even existed (see toggleMusic).
                            if(wantPlay){ start(); }
                        },
                        onStateChange: function(e){
                            playing = (e.data === YT.PlayerState.PLAYING);
                            if(playing){ failed = false; }
                            render();
                        },
                        onError: function(){
                            // 2=bad id · 5=HTML5 error · 100=removed ·
                            // 101/150=embedding disabled by the uploader.
                            fail('이 영상은 재생할 수 없습니다 (임베드 제한)');
                        }
                    }
                });
            };
            function start(){
                try{ player.playVideo(); player.setVolume(35); }catch(e){}
            }
            function fail(msg){
                failed = true; playing = false; wantPlay = false;
                if(btn){
                    btn.classList.remove('playing'); btn.classList.add('idle', 'blocked');
                    btn.title = '재생 차단됨 — 눌러서 YouTube에서 열기';
                    btn.setAttribute('aria-label', btn.title);
                }
                showMusicNote();
                try{ console.warn('[music] ' + msg); }catch(e){}
            }
            // A one-time bubble explaining the block (usually Safari's tracker
            // prevention on youtube.com) and pointing to the YouTube fallback.
            function showMusicNote(){
                if(document.getElementById('music-note')){ return; }
                var n = document.createElement('div');
                n.id = 'music-note';
                n.innerHTML = '배경음악(YouTube)이 차단됐어요. Safari라면 '
                            + '<b>크로스 사이트 추적 방지</b> 때문일 수 있어요.<br>'
                            + '버튼을 누르면 <b>YouTube에서 열기</b> &#8599;';
                document.body.appendChild(n);
                void n.offsetWidth;
                n.classList.add('show');
                setTimeout(function(){ if(n.parentNode){ n.classList.remove('show'); } }, 9000);
                setTimeout(function(){ if(n.parentNode){ n.remove(); } }, 9400);
            }
            function render(){
                if(!btn || failed){ return; }
                btn.classList.toggle('playing', playing);
                btn.classList.toggle('idle', !playing);
                btn.setAttribute('aria-label', playing ? '배경음악 정지' : '배경음악 재생');
                btn.setAttribute('aria-pressed', playing ? 'true' : 'false');
                btn.title = playing ? '배경음악 정지' : '배경음악 재생';
            }
            window.toggleMusic = function(){
                // Blocked (e.g. Safari tracker prevention): open the track on
                // YouTube directly — this tap is a user gesture, so it's allowed.
                if(failed){
                    var note = document.getElementById('music-note');
                    if(note){ note.remove(); }
                    window.open(VIDEO_URL, '_blank', 'noopener');
                    return;
                }
                // Player object not created yet (API script still loading):
                // remember the intent; onReady will honour it.
                if(!player){
                    wantPlay = true;
                    if(btn){ btn.classList.add('playing'); btn.classList.remove('idle'); }
                    return;
                }
                failed = false;
                if(playing){ player.pauseVideo(); wantPlay = false; }
                else{
                    // Call playVideo() synchronously inside the user gesture. The
                    // YT API queues commands issued before onReady, so playback
                    // starts with sound instead of being deferred to a
                    // non-gesture callback (which browsers block).
                    start();
                }
            };
            // Settings can swap the track (a YouTube link/id). Apply live when
            // the player exists; otherwise it takes effect on the next load
            // (resolveId reads the saved setting at init).
            window.setMusicVideo = function(raw){
                var id = parseYouTubeId(raw || '') || DEFAULT_ID;
                if(id === VIDEO_ID){ return; }
                VIDEO_ID = id;
                VIDEO_URL = 'https://www.youtube.com/watch?v=' + id;
                if(player && player.cueVideoById){
                    try{
                        player.cueVideoById(id);
                        failed = false;
                        if(btn){ btn.classList.remove('blocked'); }
                    }catch(e){}
                }
            };
        })();
    </script>
</body>
</html>
