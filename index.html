<!doctype html>
<html>
    <head>
    <title>dewytear's claude wiki</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Claude Code·플러그인·하네스·LLM Wiki·세컨드 브레인을 다루는 dewytear의 한글 위키.">
    <!-- Tint the mobile browser chrome to match the active theme. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1b2230" media="(prefers-color-scheme: dark)">
    <!-- Pretendard: one family that harmonizes Latin and Hangul -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="colors.js"></script>
    </head>

<body>
    <div id="nav-backdrop" onclick="toggleNav();"></div>
    <div id="grid">
        <aside id="sidebar">
            <div id="profile">
                <img id="profile-img" src="profile.jpg" alt="Profile"
                     onerror="if(this.src.indexOf('profile.svg') === -1){ this.src = 'profile.svg'; }">
            </div>
            <nav id="navigation"></nav>
            <div id="sidebar-foot">
                <a id="tags-link" href="#!tags">
                    <span class="settings-ico">&#127991;</span>Tags
                </a>
                <label id="theme-switch" title="Day / Night 전환">
                    <span class="theme-ico moon">&#9790;</span>
                    <input type="checkbox" id="theme-toggle" onchange="nightDayHandler(this);">
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                    <span class="theme-ico sun">&#9728;</span>
                </label>
                <a id="settings-link" href="#!settings" title="설정" aria-label="설정">
                    <span class="settings-ico">&#9881;</span>
                </a>
            </div>
        </aside>
        <main id="content">
            <header id="masthead">
                <button id="nav-toggle" onclick="toggleNav();" aria-label="Toggle navigation">&#9776;</button>
                <h1><a href="#!search">dewytear's claude wiki</a></h1>
                <p id="tagline">: A guide to Anthropic's Claude Code.</p>
            </header>
            <div id="content-scroll">
                <div id="article">
                    <article>
                    </article>
                </div>
                <section id="more"></section>
            </div>
        </main>
    </div>

    <!-- Floating background-music control -->
    <button id="music-btn" type="button" class="idle" onclick="toggleMusic();"
            aria-label="배경음악 재생" title="배경음악">
        <span class="music-eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    </button>
    <div id="yt-music" aria-hidden="true"></div>

    <script>

        // Apply the theme as early as possible (light is the default) so the
        // page doesn't flash the dark theme before settings load.
        (function(){
            try{
                var s = JSON.parse(localStorage.getItem('wikiSettings')) || {};
                if((s.theme || 'day') === 'day'){ document.body.classList.add('day'); }
            }catch(e){ document.body.classList.add('day'); }
        })();

        // ---- Global indexes (built once the list loads) ----
        var DOCS = [];         // real docs: {name, label, section, tags:[]}
        var TAG_INDEX = {};    // tag -> [doc, ...]
        var DOC_BY_NAME = {};  // name -> doc
        var DOC_MODEL = 'Claude Fable 5';   // default authoring-model badge (no icon)

        function buildIndexes(tree){
            (function walk(nodes, path){
                nodes.forEach(function(node){
                    if(node.children && node.children.length){
                        walk(node.children, node.title ? path.concat(node.title) : path);
                    } else if(node.name && !node.route){
                        var doc = {
                            name: node.name,
                            label: node.label || node.name,
                            section: path.join(' · '),
                            tags: node.tags || [],
                            model: node.model || ''   // optional per-doc override
                        };
                        DOCS.push(doc);
                        DOC_BY_NAME[doc.name] = doc;
                        doc.tags.forEach(function(t){
                            (TAG_INDEX[t] = TAG_INDEX[t] || []).push(doc);
                        });
                    }
                });
            })(tree, []);
        }

        function escapeHtml(s){
            return String(s).replace(/[&<>"]/g, function(c){
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
            });
        }

        // ---- Navigation tree ----
        function renderNodes(nodes){
            var html = '<ul>';
            var docSeq = 0;   // numbers the docs within this branch, per folder
            nodes.forEach(function(node){
                var label = node.label || node.title || node.name;
                if(node.children){    // a branch, collapsed by default
                    html += '<li class="nav-branch collapsed">'
                         +  '<button type="button" class="nav-title" onclick="toggleBranch(this)">'
                         +  '<span class="nav-caret">&#9662;</span>' + label + '</button>';
                    html += renderNodes(node.children);
                    html += '</li>';
                } else {
                    var target = node.route ? node.route : node.name;
                    docSeq++;
                    var num = (docSeq < 10 ? '0' : '') + docSeq;
                    html += '<li><a href="#!' + target + '">'
                         +  '<span class="doc-num">' + num + '.</span> ' + label + '</a></li>';
                }
            });
            html += '</ul>';
            return html;
        }

        // ---- Tag chip (no icon; used for the tags listed under a doc) ----
        function tagChip(tag, count){
            var html = '<a class="tag" href="#!tag:' + encodeURIComponent(tag) + '">'
                     + escapeHtml(tag);
            if(count != null){
                html += '<span class="tag-count">' + count + '</span>';
            }
            html += '</a>';
            return html;
        }

        // ---- Dictionary-index entry: term, dot leader, usage count ----
        function tagIndexEntry(tag, count, rank){
            var cls = 'idx-entry' + (rank ? ' top-' + rank : '');
            return '<a class="' + cls + '" href="#!tag:' + encodeURIComponent(tag) + '">'
                 + '<span class="idx-term">' + escapeHtml(tag) + '</span>'
                 + '<span class="idx-dots"></span>'
                 + '<span class="idx-count">' + count + '</span>'
                 + '</a>';
        }

        // The ten most-used tags, each given a distinct rank 1..10 so the
        // index can grade its emphasis by rank. Sorted by usage count, with
        // ties broken by name so the ordering is stable and reproducible.
        function topTagRanks(){
            var arr = Object.keys(TAG_INDEX).map(function(t){
                return { tag: t, n: TAG_INDEX[t].length };
            });
            arr.sort(function(a, b){
                if(b.n !== a.n){ return b.n - a.n; }
                return a.tag.toLowerCase().localeCompare(b.tag.toLowerCase(), 'ko');
            });
            var ranks = {};
            for(var i = 0; i < arr.length && i < 10; i++){
                ranks[arr[i].tag] = i + 1;
            }
            return ranks;
        }

        // ---- Article helpers ----
        function setArticle(html){
            var art = document.querySelector('article');
            art.innerHTML = html;
            // Only the content pane resets; the sidebar and masthead stay put.
            var scroller = document.getElementById('content-scroll');
            if(scroller){ scroller.scrollTop = 0; }
            window.scrollTo(0, 0);   // mobile still scrolls the page itself
            // Re-trigger the gentle fade-up animation on each navigation.
            art.classList.remove('fade-in');
            void art.offsetWidth;   // force reflow so the animation restarts
            art.classList.add('fade-in');
            initCarousels(art);
        }

        // Carousels arrive via innerHTML, so their wiring lives here.
        function initCarousels(root){
            root.querySelectorAll('.carousel').forEach(function(car){
                var scns = Array.prototype.slice.call(car.querySelectorAll('.scn'));
                var dots = Array.prototype.slice.call(car.querySelectorAll('.carousel-dots button'));
                var stage = car.querySelector('.carousel-stage');
                var label = car.querySelector('.carousel-nav .cn-label');
                var prev = car.querySelector('.carousel-nav .prev');
                var next = car.querySelector('.carousel-nav .next');
                if(!scns.length){ return; }
                var idx = 0;
                function show(i){
                    idx = (i + scns.length) % scns.length;
                    scns.forEach(function(s, k){ s.classList.toggle('active', k === idx); });
                    dots.forEach(function(d, k){ d.classList.toggle('active', k === idx); });
                    if(label){ label.textContent = (idx + 1) + ' / ' + scns.length; }
                    if(stage){ stage.scrollTop = 0; }   // each panel starts at its top
                }
                dots.forEach(function(d, k){
                    d.addEventListener('click', function(){ show(k); });
                });
                if(prev){ prev.addEventListener('click', function(){ show(idx - 1); }); }
                if(next){ next.addEventListener('click', function(){ show(idx + 1); }); }
                show(0);
            });
        }

        function renderDocTags(tags){
            var html = '<div class="doc-tags"><span class="doc-tags-label">Tags</span>';
            tags.forEach(function(t){ html += tagChip(t, null); });
            html += '</div>';
            return html;
        }

        function fetchPage(filename){
            fetch(filename).then(function(response){
                response.text().then(function(text){
                    var doc = DOC_BY_NAME[filename];
                    if(doc && doc.tags.length){
                        text += renderDocTags(doc.tags);
                    }
                    setArticle(text);
                    // Pin the authoring-model badge to the content pane's right edge.
                    var art = document.getElementById('article');
                    var label = (doc && doc.model) || DOC_MODEL;
                    if(art && label){
                        var span = document.createElement('span');
                        span.className = 'doc-model';
                        span.textContent = label;
                        art.appendChild(span);
                    }
                })
            })
        }

        // ---- Tag index (all tags) with instant search ----
        function showTagIndex(){
            var html = '<h2>Tags</h2>'
                     + '<input id="tag-search" type="search" placeholder="Search tags..."'
                     + ' oninput="filterTags(this.value)" autocomplete="off">'
                     + '<div id="tag-top"></div>'
                     + '<div id="tag-cloud"></div>';
            setArticle(html);
            renderTopTags();
            filterTags('');
            var box = document.getElementById('tag-search');
            if(box){ box.focus(); }
        }

        // Highlighted band of the most-used tags, ordered by the top-10
        // ranking and showing only the tag words. Top-3 keep medal colors.
        function renderTopTags(){
            var ranks = topTagRanks();
            var ranked = Object.keys(ranks);
            var el = document.getElementById('tag-top');
            if(!el){ return; }
            if(!ranked.length){ el.innerHTML = ''; return; }
            ranked.sort(function(a, b){ return ranks[a] - ranks[b]; });
            var html = '<h3 class="idx-top-title">많이 쓰인 태그</h3>'
                     + '<ol class="idx-top-list">';
            ranked.forEach(function(t){
                html += '<li><a class="idx-top-item top-' + ranks[t] + '"'
                     +  ' href="#!tag:' + encodeURIComponent(t) + '">'
                     +  escapeHtml(t)
                     +  '</a></li>';
            });
            html += '</ol>';
            el.innerHTML = html;
        }

        // Initial-letter buckets for the index. English tags group under
        // A-Z; Korean tags group under their leading consonant (초성), with
        // the doubled consonants folded onto their base (ㄲ→ㄱ, ㅃ→ㅂ, ...).
        var HANGUL_CHO = ['ㄱ','ㄱ','ㄴ','ㄷ','ㄷ','ㄹ','ㅁ','ㅂ','ㅂ','ㅅ',
                          'ㅅ','ㅇ','ㅈ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        var CHO_ORDER = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ',
                         'ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        function tagInitial(tag){
            var ch = tag.charAt(0);
            var code = ch.charCodeAt(0);
            if(code >= 0xAC00 && code <= 0xD7A3){   // a composed Hangul syllable
                return HANGUL_CHO[Math.floor((code - 0xAC00) / 588)];
            }
            var up = ch.toUpperCase();
            return (up >= 'A' && up <= 'Z') ? up : '#';
        }
        // Order buckets as A-Z first, then the Korean consonants, then '#'.
        function initialRank(k){
            if(k >= 'A' && k <= 'Z'){ return [0, k.charCodeAt(0)]; }
            var ci = CHO_ORDER.indexOf(k);
            return ci >= 0 ? [1, ci] : [2, 0];
        }

        // Group the (optionally filtered) tags by initial and lay them out
        // like the index at the back of a dictionary. The top-10 usage ranks
        // still drive the emphasis on each entry.
        function filterTags(query){
            var q = query.trim().toLowerCase();
            var tags = Object.keys(TAG_INDEX).sort(function(a, b){
                return a.toLowerCase().localeCompare(b.toLowerCase(), 'ko');
            });
            var ranks = topTagRanks();
            var groups = {}, letters = [];
            tags.forEach(function(t){
                if(q && t.toLowerCase().indexOf(q) === -1){ return; }
                var k = tagInitial(t);
                if(!groups[k]){ groups[k] = []; letters.push(k); }
                groups[k].push(t);
            });
            letters.sort(function(a, b){
                var ra = initialRank(a), rb = initialRank(b);
                return ra[0] - rb[0] || ra[1] - rb[1];
            });
            var html = '';
            letters.forEach(function(k){
                html += '<section class="idx-group">'
                     +  '<h3 class="idx-letter">' + escapeHtml(k) + '</h3>'
                     +  '<div class="idx-list">';
                groups[k].forEach(function(t){
                    html += tagIndexEntry(t, TAG_INDEX[t].length, ranks[t]);
                });
                html += '</div></section>';
            });
            if(!html){ html = '<p class="empty">No matching tags.</p>'; }
            var cloud = document.getElementById('tag-cloud');
            if(cloud){ cloud.innerHTML = html; }
            // The "most used" band belongs to the full index, not a search.
            var top = document.getElementById('tag-top');
            if(top){ top.style.display = q ? 'none' : ''; }
        }

        // ---- Docs for a single tag ----
        function showTag(tag){
            var docs = TAG_INDEX[tag] || [];
            var html = '<h2>' + escapeHtml(tag) + '</h2>'
                     + '<p class="tag-back"><a href="#!tags">&larr; All tags</a></p>'
                     + '<ul class="more-list">';
            docs.forEach(function(d){
                html += '<li><a href="#!' + d.name + '">'
                     +  '<span class="more-name">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="more-meta">' + escapeHtml(d.section) + '</span></a></li>';
            });
            html += '</ul>';
            setArticle(html);
        }

        // ---- Unified search screen (landing page & title click) ----
        // Matches every whitespace-separated term against a doc's label,
        // its section path, and its tags, so "hooks 자동화" narrows as typed.
        function searchDocs(query){
            var q = query.trim().toLowerCase();
            if(!q){ return []; }
            var terms = q.split(/\s+/);
            return DOCS.filter(function(d){
                var hay = (d.label + ' ' + d.section + ' ' + d.tags.join(' ')).toLowerCase();
                return terms.every(function(t){ return hay.indexOf(t) !== -1; });
            });
        }

        var SEARCH_LIMIT = 8;
        function renderSearchResults(query){
            var box = document.getElementById('search-results');
            if(!box){ return; }
            var q = query.trim();
            if(!q){ box.innerHTML = ''; box.classList.remove('open'); return; }
            var docs = searchDocs(query);
            if(!docs.length){
                box.innerHTML = '<p class="search-empty">&ldquo;' + escapeHtml(q)
                              + '&rdquo;에 대한 결과가 없습니다.</p>';
                box.classList.add('open');
                return;
            }
            var html = '';
            docs.slice(0, SEARCH_LIMIT).forEach(function(d){
                html += '<a class="search-hit" href="#!' + d.name + '">'
                     +  '<span class="sh-label">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="sh-meta">' + escapeHtml(d.section) + '</span>';
                if(d.tags.length){
                    html += '<span class="sh-tags">';
                    d.tags.slice(0, 4).forEach(function(t){
                        html += '<span class="sh-tag">' + escapeHtml(t) + '</span>';
                    });
                    html += '</span>';
                }
                html += '</a>';
            });
            if(docs.length > SEARCH_LIMIT){
                html += '<p class="search-more">외 ' + (docs.length - SEARCH_LIMIT) + '개 더…</p>';
            }
            box.innerHTML = html;
            box.classList.add('open');
        }

        function showSearch(){
            var html =
                '<div class="search-screen">'
              +   '<div class="search-bg" aria-hidden="true">'
              +     '<span class="blob b1"></span><span class="blob b2"></span>'
              +     '<span class="blob b3"></span><span class="blob b4"></span>'
              +   '</div>'
              +   '<div class="search-core">'
              +     '<h2 class="search-head">무엇을 찾으세요?</h2>'
              +     '<p class="search-sub">Claude Code · 플러그인 · 하네스 · 세컨드 브레인</p>'
              +     '<div class="search-field">'
              +       '<span class="search-ico" aria-hidden="true">&#128269;</span>'
              +       '<input id="search-input" type="search" autocomplete="off"'
              +         ' placeholder="문서 · 태그 · 주제를 검색…"'
              +         ' oninput="renderSearchResults(this.value)">'
              +     '</div>'
              +     '<div id="search-results"></div>'
              +   '</div>'
              + '</div>';
            setArticle(html);
            var box = document.getElementById('search-input');
            if(box){ box.focus(); }
        }

        // ---- "Recent docs" module: paginated board ----
        // Ordered by each doc's last commit date, fetched from the GitHub
        // API (cached for an hour). Until dates arrive, list order shows.
        var MORE_PAGE_SIZE = 5;
        var MORE_BLOCK = 7;    // page numbers shown per pager block (fits mobile width)
        var morePage = 0;
        var REPO_API = 'https://api.github.com/repos/dewytear/dewytear.github.io';
        var DOC_DATES_KEY = 'wikiDocDates.v1';

        function morePageCount(){
            return Math.max(1, Math.ceil(DOCS.length / MORE_PAGE_SIZE));
        }

        function renderMore(){
            var pages = morePageCount();
            if(morePage >= pages){ morePage = pages - 1; }
            var start = morePage * MORE_PAGE_SIZE;
            var html = '<h3 class="more-title">최근 문서</h3><ul class="more-list">';
            DOCS.slice(start, start + MORE_PAGE_SIZE).forEach(function(d){
                var meta = d.section + (d.date ? ' · ' + d.date.slice(0, 10) : '');
                html += '<li><a href="#!' + d.name + '">'
                     +  '<span class="more-name">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="more-meta">' + escapeHtml(meta) + '</span></a></li>';
            });
            html += '</ul>';
            if(pages > 1){
                // Numbered pager: seven pages per block, with side arrows that
                // jump a whole seven-page block at a time.
                var block = Math.floor(morePage / MORE_BLOCK);
                var first = block * MORE_BLOCK;
                var last = Math.min(first + MORE_BLOCK, pages);
                html += '<div class="more-nav">'
                     +  '<button class="more-arrow" onclick="moreBlock(-1)"'
                     +      (block === 0 ? ' disabled' : '') + ' aria-label="이전 7페이지">&laquo;</button>'
                     +  '<span class="more-pages">';
                for(var i = first; i < last; i++){
                    html += '<button class="more-page' + (i === morePage ? ' active' : '') + '"'
                         +  ' onclick="moreGoto(' + i + ')">' + (i + 1) + '</button>';
                }
                html += '</span>'
                     +  '<button class="more-arrow" onclick="moreBlock(1)"'
                     +      (last >= pages ? ' disabled' : '') + ' aria-label="다음 7페이지">&raquo;</button>'
                     +  '</div>';
            }
            return html;
        }

        function moreGoto(page){
            var pages = morePageCount();
            morePage = Math.max(0, Math.min(page, pages - 1));
            document.querySelector('#more').innerHTML = renderMore();
        }

        // Jump forward/back a full seven-page block, landing on its first page.
        function moreBlock(dir){
            var pages = morePageCount();
            var maxBlock = Math.floor((pages - 1) / MORE_BLOCK);
            var block = Math.floor(morePage / MORE_BLOCK) + dir;
            block = Math.max(0, Math.min(block, maxBlock));
            morePage = block * MORE_BLOCK;
            document.querySelector('#more').innerHTML = renderMore();
        }

        function loadCachedDocDates(){
            try{
                var s = JSON.parse(localStorage.getItem(DOC_DATES_KEY));
                if(s && Date.now() - s.at < 3600000){ return s.dates; }
            }catch(e){}
            return null;
        }

        function fetchDocDates(){
            var dates = {};
            return Promise.all(DOCS.map(function(d){
                var url = REPO_API + '/commits?path=' + encodeURIComponent(d.name) + '&per_page=1';
                return fetch(url).then(function(r){
                    return r.ok ? r.json() : null;
                }).then(function(j){
                    if(j && j[0]){ dates[d.name] = j[0].commit.committer.date; }
                }).catch(function(){});
            })).then(function(){
                if(Object.keys(dates).length){
                    try{
                        localStorage.setItem(DOC_DATES_KEY,
                            JSON.stringify({ at: Date.now(), dates: dates }));
                    }catch(e){}
                }
                return dates;
            });
        }

        function applyDocDates(dates){
            if(!dates || !Object.keys(dates).length){ return; }
            DOCS.forEach(function(d){ d.date = dates[d.name] || ''; });
            DOCS.sort(function(a, b){
                return a.date < b.date ? 1 : a.date > b.date ? -1 : 0;
            });
            morePage = 0;   // reordering restarts the board at page one
            document.querySelector('#more').innerHTML = renderMore();
        }

        function refreshRecentDocs(){
            var cached = loadCachedDocDates();
            if(cached){ applyDocDates(cached); }
            else { fetchDocDates().then(applyDocDates); }
        }

        // ---- Settings (client-side, password-gated) ----
        var SETTINGS_KEY = 'wikiSettings';
        var SETTINGS_UNLOCKED = false;
        var PENDING_IMAGE = null;

        function loadSettings(){
            try{ return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
            catch(e){ return {}; }
        }
        function saveSettings(s){
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        }
        function getPassword(){
            var s = loadSettings();
            return s.password || '1111';   // default password
        }
        function applySettings(){
            var s = loadSettings();
            if(s.image){
                var img = document.getElementById('profile-img');
                if(img){ img.src = s.image; }
            }
            if(s.title){
                var h = document.querySelector('#masthead h1 a');
                if(h){ h.textContent = s.title; }
                document.title = s.title;
            }
            if(s.tagline != null){
                var t = document.getElementById('tagline');
                if(t){ t.textContent = s.tagline; }
            }
            // Light (day) theme is the default; a saved choice wins.
            var isDay = (s.theme || 'day') === 'day';
            document.body.classList.toggle('day', isDay);
            var toggle = document.getElementById('theme-toggle');
            if(toggle){ toggle.checked = isDay; }
        }

        // Global config lives in the repo (same-origin, no API key needed).
        // The profile image points at a public Google Drive file by id.
        function driveImageUrl(id){
            return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(id) + '&sz=w512';
        }
        function applyRepoConfig(){
            return fetch('config.json', { cache: 'no-store' }).then(function(r){
                return r.ok ? r.json() : null;
            }).then(function(cfg){
                if(!cfg){ return; }
                if(cfg.title){
                    var h = document.querySelector('#masthead h1 a');
                    if(h){ h.textContent = cfg.title; }
                    document.title = cfg.title;
                }
                if(cfg.tagline != null){
                    var t = document.getElementById('tagline');
                    if(t){ t.textContent = cfg.tagline; }
                }
                var src = cfg.imageId ? driveImageUrl(cfg.imageId) : (cfg.image || '');
                if(src){
                    var img = document.getElementById('profile-img');
                    if(img){ img.src = src; }
                }
            }).catch(function(){ /* offline / missing config: keep defaults */ });
        }

        function openSettings(){
            if(SETTINGS_UNLOCKED){ showSettings(); }
            else { showSettingsLock(); }
        }

        function showSettingsLock(){
            var html = '<h2>설정</h2>'
                     + '<p class="settings-note">설정을 변경하려면 암호를 입력하세요.</p>'
                     + '<div class="settings-field">'
                     +   '<label for="settings-pass">암호</label>'
                     +   '<input id="settings-pass" type="password" autocomplete="current-password"'
                     +   ' onkeydown="if(event.key===\'Enter\'){unlockSettings();}">'
                     + '</div>'
                     + '<div class="settings-actions">'
                     +   '<button class="settings-save" onclick="unlockSettings()">확인</button>'
                     + '</div>'
                     + '<p id="settings-msg" class="settings-msg error" hidden>암호가 올바르지 않습니다.</p>';
            setArticle(html);
            var box = document.getElementById('settings-pass');
            if(box){ box.focus(); }
        }

        function unlockSettings(){
            var box = document.getElementById('settings-pass');
            if(box && box.value === getPassword()){
                SETTINGS_UNLOCKED = true;
                showSettings();
            } else {
                var msg = document.getElementById('settings-msg');
                if(msg){ msg.hidden = false; }
                if(box){ box.value = ''; box.focus(); }
            }
        }

        function showSettings(){
            var s = loadSettings();
            var curImg = s.image || 'profile.svg';
            var curTitle = s.title || document.querySelector('#masthead h1 a').textContent;
            var curTagline = s.tagline != null ? s.tagline
                           : document.getElementById('tagline').textContent;
            var html =
                '<h2>설정</h2>'
              + '<p class="settings-note">변경 내용은 이 브라우저에만 저장됩니다.</p>'
              + '<div class="settings-field">'
              +   '<label>프로필 사진</label>'
              +   '<div class="settings-photo">'
              +     '<img id="settings-preview" src="' + escapeHtml(curImg) + '" alt="미리보기">'
              +     '<input id="settings-file" type="file" accept="image/*" onchange="previewPhoto(this)">'
              +   '</div>'
              + '</div>'
              + '<div class="settings-field">'
              +   '<label for="settings-title">타이틀</label>'
              +   '<input id="settings-title" type="text" value="' + escapeHtml(curTitle) + '">'
              + '</div>'
              + '<div class="settings-field">'
              +   '<label for="settings-tagline">타이틀 문구</label>'
              +   '<input id="settings-tagline" type="text" value="' + escapeHtml(curTagline) + '">'
              + '</div>'
              + '<div class="settings-field">'
              +   '<label for="settings-newpass">새 암호 (변경 시에만 입력)</label>'
              +   '<input id="settings-newpass" type="password" autocomplete="new-password" placeholder="비워두면 유지">'
              + '</div>'
              + '<div class="settings-actions">'
              +   '<button class="settings-save" onclick="saveSettingsForm()">저장</button>'
              +   '<button class="settings-reset" onclick="resetSettings()">기본값으로</button>'
              + '</div>'
              + '<p id="settings-msg" class="settings-msg" hidden></p>';
            setArticle(html);
        }

        // Downscale the chosen image so it fits comfortably in localStorage.
        function previewPhoto(input){
            var file = input.files && input.files[0];
            if(!file){ return; }
            var reader = new FileReader();
            reader.onload = function(e){
                var img = new Image();
                img.onload = function(){
                    var max = 256;
                    var scale = Math.min(1, max / Math.max(img.width, img.height));
                    var w = Math.round(img.width * scale);
                    var h = Math.round(img.height * scale);
                    var canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    PENDING_IMAGE = canvas.toDataURL('image/png');
                    var prev = document.getElementById('settings-preview');
                    if(prev){ prev.src = PENDING_IMAGE; }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function settingsMsg(text, isError){
            var el = document.getElementById('settings-msg');
            if(!el){ return; }
            el.textContent = text;
            el.hidden = false;
            el.classList.toggle('error', !!isError);
        }

        function saveSettingsForm(){
            var s = loadSettings();
            if(PENDING_IMAGE){ s.image = PENDING_IMAGE; }
            s.title = document.getElementById('settings-title').value.trim();
            s.tagline = document.getElementById('settings-tagline').value;
            var np = document.getElementById('settings-newpass').value;
            if(np){ s.password = np; }
            try{
                saveSettings(s);
                applySettings();
                PENDING_IMAGE = null;
                document.getElementById('settings-newpass').value = '';
                settingsMsg(np ? '저장되었습니다. 암호가 변경되었습니다.' : '저장되었습니다.');
            }catch(e){
                settingsMsg('저장에 실패했습니다. 이미지 용량이 너무 큽니다.', true);
            }
        }

        function resetSettings(){
            if(!window.confirm('사진·타이틀·암호를 모두 기본값으로 되돌릴까요?')){ return; }
            localStorage.removeItem(SETTINGS_KEY);
            PENDING_IMAGE = null;
            SETTINGS_UNLOCKED = false;
            location.reload();
        }

        // Mark the nav link for the doc on screen (null clears every mark).
        function markActiveNav(name){
            var nav = document.getElementById('navigation');
            if(!nav){ return; }
            var want = name ? '#!' + name : null;
            nav.querySelectorAll('.nav-branch.on-path').forEach(function(li){
                li.classList.remove('on-path');
            });
            nav.querySelectorAll('a').forEach(function(a){
                var active = a.getAttribute('href') === want;
                a.classList.toggle('nav-active', active);
                if(active){
                    // Light up the guide rails along the active doc's ancestry.
                    var li = a.closest('.nav-branch');
                    while(li){ li.classList.add('on-path'); li = li.parentNode.closest('.nav-branch'); }
                }
            });
        }

        // ---- Router ----
        function route(){
            document.body.classList.remove('nav-open');   // close mobile drawer
            var h = location.hash;
            var path = h ? h.substr(2) : '';               // strip "#!"
            // Hide the "recent docs" module on the settings, tags and search screens.
            document.body.classList.toggle('settings-view', path === 'settings');
            document.body.classList.toggle('tags-view', path === 'tags');
            // The unified search screen is both the landing page (empty hash)
            // and the destination of the masthead title link (#!search).
            var isSearch = !h || path === 'search';
            document.body.classList.toggle('search-view', isSearch);
            if(isSearch){ showSearch(); markActiveNav(null); return; }
            if(path === 'tags'){ showTagIndex(); markActiveNav(null); }
            else if(path.indexOf('tag:') === 0){ showTag(decodeURIComponent(path.substr(4))); markActiveNav(null); }
            else if(path === 'settings'){ openSettings(); markActiveNav(null); }
            else { fetchPage(path); markActiveNav(path); }
        }

        function toggleNav(){
            document.body.classList.toggle('nav-open');
        }

        function toggleBranch(btn){
            btn.parentNode.classList.toggle('collapsed');
        }

        function setAllBranches(collapsed){
            document.querySelectorAll('#navigation .nav-branch').forEach(function(li){
                li.classList.toggle('collapsed', collapsed);
            });
        }
        function expandAll(){ setAllBranches(false); }
        function collapseAll(){ setAllBranches(true); }

        // ---- Boot ----
        window.addEventListener('hashchange', route);
        // Repo config is the global source; local (localStorage) tweaks win on top.
        applyRepoConfig().then(applySettings);

        fetch('list').then(function(response){
            response.json().then(function(tree){
                buildIndexes(tree);
                document.querySelector('#navigation').innerHTML =
                    '<div class="nav-tools">'
                  + '<button type="button" class="nav-tool" onclick="expandAll()">모두 펼치기</button>'
                  + '<button type="button" class="nav-tool" onclick="collapseAll()">모두 접기</button>'
                  + '</div>'
                  + renderNodes(tree);
                document.querySelector('#more').innerHTML = renderMore();
                refreshRecentDocs();   // reorder by last-modified once dates load
                route();   // render the initial page once indexes exist
            })
        })

        // ---- Floating background music (YouTube IFrame API) ----
        (function(){
            var VIDEO_ID = '08A9n8QyE3k';
            var player, ready = false, playing = false, wantPlay = false, failed = false;
            var btn = document.getElementById('music-btn');

            // If the API never loads (offline / blocked by an ad- or tracker
            // blocker), tell the user instead of leaving a dead button.
            var apiTimer = setTimeout(function(){
                if(!player){ fail('음악 로드 실패 (네트워크·차단기 확인)'); }
            }, 6000);

            var tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            tag.onerror = function(){ fail('음악 로드 실패 (네트워크·차단기 확인)'); };
            document.head.appendChild(tag);

            window.onYouTubeIframeAPIReady = function(){
                clearTimeout(apiTimer);
                player = new YT.Player('yt-music', {
                    // Real (off-screen) size — Safari refuses playback on a
                    // zero-size/hidden media element even after a user tap.
                    height: '200', width: '200', videoId: VIDEO_ID,
                    playerVars: { autoplay: 0, controls: 0, loop: 1,
                                  playlist: VIDEO_ID, playsinline: 1,
                                  origin: location.origin },
                    events: {
                        onReady: function(){
                            ready = true;
                            try{ player.setVolume(35); }catch(e){}
                            // Fallback for a tap that arrived before the player
                            // object even existed (see toggleMusic).
                            if(wantPlay){ start(); }
                        },
                        onStateChange: function(e){
                            playing = (e.data === YT.PlayerState.PLAYING);
                            if(playing){ failed = false; }
                            render();
                        },
                        onError: function(){
                            // 2=bad id · 5=HTML5 error · 100=removed ·
                            // 101/150=embedding disabled by the uploader.
                            fail('이 영상은 재생할 수 없습니다 (임베드 제한)');
                        }
                    }
                });
            };
            function start(){
                try{ player.playVideo(); player.setVolume(35); }catch(e){}
            }
            function fail(msg){
                failed = true; playing = false; wantPlay = false;
                if(btn){
                    btn.classList.remove('playing'); btn.classList.add('idle');
                    btn.title = msg;
                    btn.setAttribute('aria-label', msg);
                }
                try{ console.warn('[music] ' + msg); }catch(e){}
            }
            function render(){
                if(!btn || failed){ return; }
                btn.classList.toggle('playing', playing);
                btn.classList.toggle('idle', !playing);
                btn.setAttribute('aria-label', playing ? '배경음악 정지' : '배경음악 재생');
                btn.setAttribute('aria-pressed', playing ? 'true' : 'false');
                btn.title = playing ? '배경음악 정지' : '배경음악 재생';
            }
            window.toggleMusic = function(){
                // Player object not created yet (API script still loading):
                // remember the intent; onReady will honour it.
                if(!player){
                    wantPlay = true;
                    if(btn){ btn.classList.add('playing'); btn.classList.remove('idle'); }
                    return;
                }
                failed = false;
                if(playing){ player.pauseVideo(); wantPlay = false; }
                else{
                    // Call playVideo() synchronously inside the user gesture. The
                    // YT API queues commands issued before onReady, so playback
                    // starts with sound instead of being deferred to a
                    // non-gesture callback (which browsers block).
                    start();
                }
            };
        })();
    </script>
