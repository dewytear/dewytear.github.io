<!doctype html>
<html>
    <head>
    <title>Aaron's Claude Wiki</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Claude Code·플러그인·하네스·LLM Wiki·세컨드 브레인을 다루는 dewytear의 한글 위키.">
    <!-- Tint the mobile browser chrome to match the active theme. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1b2230" media="(prefers-color-scheme: dark)">
    <!-- Pretendard: one family that harmonizes Latin and Hangul -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="colors.js"></script>
    </head>

<body>
    <div id="nav-backdrop" onclick="toggleNav();"></div>
    <div id="grid">
        <aside id="sidebar">
            <div id="profile">
                <img id="profile-img" src="profile.jpg" alt="Profile"
                     onerror="if(this.src.indexOf('profile.svg') === -1){ this.src = 'profile.svg'; }">
                <p id="profile-tagline"><span class="ptl-text">Wanna fly with me</span> <span class="pf-arrow" aria-hidden="true">&#8599;</span></p>
            </div>
            <nav id="navigation"></nav>
            <div id="sidebar-foot">
                <a id="tags-link" href="#!tags">
                    <span class="settings-ico">&#127991;</span>Tags
                </a>
                <label id="theme-switch" title="Day / Night 전환">
                    <span class="theme-ico moon">&#9790;</span>
                    <input type="checkbox" id="theme-toggle" onchange="nightDayHandler(this);">
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                    <span class="theme-ico sun">&#9728;</span>
                </label>
                <a id="settings-link" href="#!settings" title="설정" aria-label="설정">
                    <span class="settings-ico">&#9881;</span>
                </a>
            </div>
        </aside>
        <main id="content">
            <header id="masthead">
                <button id="nav-toggle" onclick="toggleNav();" aria-label="Toggle navigation"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="3"/><line x1="9.5" y1="4" x2="9.5" y2="20"/></svg></button>
                <h1><a href="#!search">Aaron's Claude Wiki</a></h1>
                <p id="tagline">: A guide to Aaron's Claude Project.</p>
            </header>
            <div id="content-scroll">
                <div id="article">
                    <article>
                    </article>
                </div>
                <section id="more"></section>
            </div>
        </main>
    </div>

    <!-- Floating background-music control -->
    <button id="music-btn" type="button" class="idle" onclick="toggleMusic();"
            aria-label="배경음악 재생" title="배경음악">
        <span class="music-eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    </button>
    <div id="yt-music" aria-hidden="true"></div>

    <script>

        // Apply the theme as early as possible (light is the default) so the
        // page doesn't flash the dark theme before settings load.
        (function(){
            try{
                var s = JSON.parse(localStorage.getItem('wikiSettings')) || {};
                if((s.theme || 'day') === 'day'){ document.body.classList.add('day'); }
            }catch(e){ document.body.classList.add('day'); }
            // Desktop sidebar: HIDDEN by default on first visit; only an
            // explicit expand ('0') keeps it open. The class only takes
            // effect on wide screens (scoped in CSS).
            try{
                if(localStorage.getItem('navCollapsed') !== '0'){
                    document.body.classList.add('nav-collapsed');
                }
            }catch(e){ document.body.classList.add('nav-collapsed'); }
        })();

        // ---- Global indexes (built once the list loads) ----
        var DOCS = [];         // real docs: {name, label, section, tags:[]}
        var TAG_INDEX = {};    // tag -> [doc, ...]
        var DOC_BY_NAME = {};  // name -> doc
        var FOLDER_DOCS = {};  // section (parent-folder path) -> [doc, ...] in tree order
        // Authoring-model badge. Per-doc truth lives in the list node's
        // "model" field — set it from the AUTHORING SESSION's model when a
        // doc is added or substantially rewritten. This constant is only
        // the fallback for docs that predate the rule.
        var DOC_MODEL = 'Claude Fable 5';

        function buildIndexes(tree){
            (function walk(nodes, path){
                nodes.forEach(function(node){
                    if(node.children && node.children.length){
                        walk(node.children, node.title ? path.concat(node.title) : path);
                    } else if(node.name && !node.route){
                        var doc = {
                            name: node.name,
                            label: node.label || node.name,
                            section: path.join(' · '),
                            tags: node.tags || [],
                            model: node.model || ''   // optional per-doc override
                        };
                        DOCS.push(doc);
                        DOC_BY_NAME[doc.name] = doc;
                        // Group by immediate parent folder, in tree order. Kept
                        // separate from DOCS so the later date-sort of DOCS
                        // doesn't reorder a folder's own reading sequence.
                        (FOLDER_DOCS[doc.section] = FOLDER_DOCS[doc.section] || []).push(doc);
                        doc.tags.forEach(function(t){
                            (TAG_INDEX[t] = TAG_INDEX[t] || []).push(doc);
                        });
                    }
                });
            })(tree, []);
        }

        function escapeHtml(s){
            return String(s).replace(/[&<>"]/g, function(c){
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
            });
        }

        // ---- Navigation tree ----
        // A folder with 2+ direct docs (Work Log excluded) gets a digest icon
        // that shows all its docs on one page. It rides inside the title button
        // as a flex child (stopPropagation keeps it from toggling the branch),
        // which aligns it cleanly at every nesting level. `path` mirrors
        // buildIndexes so the folder's section key matches FOLDER_DOCS.
        function folderDigestSpan(sectionKey){
            var docs = FOLDER_DOCS[sectionKey];
            if(!docs || docs.length < 2 || sectionKey.indexOf('Work Log') === 0){ return ''; }
            return '<span class="folder-digest" role="button" tabindex="0"'
                 + ' title="이 폴더 문서 모아보기" aria-label="이 폴더 문서 모아보기"'
                 + ' data-section="' + escapeHtml(sectionKey) + '"'
                 + ' onclick="openFolderDigest(event, this)"'
                 + ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openFolderDigest(event,this);}">&#10697;</span>';
        }
        function openFolderDigest(ev, el){
            ev.stopPropagation();   // don't toggle the branch
            location.hash = '#!folder:' + encodeURIComponent(el.getAttribute('data-section'));
        }
        function renderNodes(nodes, path){
            path = path || [];
            var html = '<ul>';
            var docSeq = 0;   // numbers the docs within this branch, per folder
            nodes.forEach(function(node){
                var label = node.label || node.title || node.name;
                if(node.children){    // a branch, collapsed by default
                    var childPath = node.title ? path.concat(node.title) : path;
                    // Tag top-level categories so Settings can show/hide them.
                    var catAttr = (path.length === 0 && node.title)
                                ? ' data-cat="' + escapeHtml(node.title) + '"' : '';
                    html += '<li class="nav-branch collapsed"' + catAttr + '>'
                         +  '<button type="button" class="nav-title" onclick="toggleBranch(this)">'
                         +  '<span class="nav-caret">&#9662;</span>'
                         +  '<span class="nav-title-text">' + escapeHtml(label) + '</span>'
                         +  folderDigestSpan(childPath.join(' · '))
                         +  '</button>';
                    html += renderNodes(node.children, childPath);
                    html += '</li>';
                } else {
                    var target = node.route ? node.route : node.name;
                    var numHtml;
                    if(node.mark){
                        // A marked doc (e.g. a guide) shows a symbol, not a
                        // sequence number, and doesn't consume the count.
                        numHtml = '<span class="doc-num doc-mark">' + escapeHtml(node.mark) + '</span>';
                    } else if(node.nonum){
                        // A top-level standalone doc (e.g. 지식 지도) carries no
                        // number and doesn't consume the count.
                        numHtml = '';
                    } else {
                        docSeq++;
                        var num = (docSeq < 10 ? '0' : '') + docSeq;
                        numHtml = '<span class="doc-num">' + num + '.</span>';
                    }
                    html += '<li><a href="#!' + target + '">'
                         +  (numHtml ? numHtml + ' ' : '') + escapeHtml(label) + '</a></li>';
                }
            });
            html += '</ul>';
            return html;
        }

        // ---- Tag chip (no icon; used for the tags listed under a doc) ----
        function tagChip(tag){
            return '<a class="tag" href="#!tag:' + encodeURIComponent(tag) + '">'
                 + escapeHtml(tag) + '</a>';
        }

        // ---- Dictionary-index entry: term, dot leader, usage count ----
        function tagIndexEntry(tag, count, rank){
            var cls = 'idx-entry' + (rank ? ' top-' + rank : '');
            return '<a class="' + cls + '" href="#!tag:' + encodeURIComponent(tag) + '">'
                 + '<span class="idx-term">' + escapeHtml(tag) + '</span>'
                 + '<span class="idx-dots"></span>'
                 + '<span class="idx-count">' + count + '</span>'
                 + '</a>';
        }

        // The ten most-used tags, each given a distinct rank 1..10 so the
        // index can grade its emphasis by rank. Sorted by usage count, with
        // ties broken by name so the ordering is stable and reproducible.
        function topTagRanks(){
            var arr = Object.keys(TAG_INDEX).map(function(t){
                return { tag: t, n: TAG_INDEX[t].length };
            });
            arr.sort(function(a, b){
                if(b.n !== a.n){ return b.n - a.n; }
                return a.tag.toLowerCase().localeCompare(b.tag.toLowerCase(), 'ko');
            });
            var ranks = {};
            for(var i = 0; i < arr.length && i < 10; i++){
                ranks[arr[i].tag] = i + 1;
            }
            return ranks;
        }

        // ---- Article helpers ----
        function setArticle(html){
            var art = document.querySelector('article');
            art.innerHTML = html;
            // Clear per-doc extras left over from the previous doc — the
            // authoring-model badge and the AI related-docs block both live on
            // the #article wrapper (outside <article>), so replacing the body
            // alone would leave them showing the PREVIOUS doc's content.
            document.querySelectorAll('#article .doc-model, #article .related')
                .forEach(function(el){ el.remove(); });
            // Only the content pane resets; the sidebar and masthead stay put.
            var scroller = document.getElementById('content-scroll');
            if(scroller){ scroller.scrollTop = 0; }
            window.scrollTo(0, 0);   // mobile still scrolls the page itself
            // Re-trigger the gentle fade-up animation on each navigation.
            art.classList.remove('fade-in');
            void art.offsetWidth;   // force reflow so the animation restarts
            art.classList.add('fade-in');
            initCarousels(art);
        }

        // Carousels arrive via innerHTML, so their wiring lives here.
        function initCarousels(root){
            root.querySelectorAll('.carousel').forEach(function(car){
                var scns = Array.prototype.slice.call(car.querySelectorAll('.scn'));
                var dots = Array.prototype.slice.call(car.querySelectorAll('.carousel-dots button'));
                var stage = car.querySelector('.carousel-stage');
                var label = car.querySelector('.carousel-nav .cn-label');
                var prev = car.querySelector('.carousel-nav .prev');
                var next = car.querySelector('.carousel-nav .next');
                if(!scns.length){ return; }
                var idx = 0;
                function show(i){
                    idx = (i + scns.length) % scns.length;
                    scns.forEach(function(s, k){ s.classList.toggle('active', k === idx); });
                    dots.forEach(function(d, k){ d.classList.toggle('active', k === idx); });
                    if(label){ label.textContent = (idx + 1) + ' / ' + scns.length; }
                    if(stage){ stage.scrollTop = 0; }   // each panel starts at its top
                }
                dots.forEach(function(d, k){
                    d.addEventListener('click', function(){ show(k); });
                });
                if(prev){ prev.addEventListener('click', function(){ show(idx - 1); }); }
                if(next){ next.addEventListener('click', function(){ show(idx + 1); }); }
                show(0);
            });
        }

        function renderDocTags(tags){
            var html = '<div class="doc-tags"><span class="doc-tags-label">Tags</span>';
            tags.forEach(function(t){ html += tagChip(t); });
            html += '</div>';
            return html;
        }

        function fetchPage(filename){
            fetch(filename).then(function(response){
                response.text().then(function(text){
                    var doc = DOC_BY_NAME[filename];
                    if(doc && doc.tags.length){
                        text += renderDocTags(doc.tags);
                    }
                    setArticle(text);
                    // Pin the authoring-model badge to the content pane's right edge.
                    var art = document.getElementById('article');
                    var label = (doc && doc.model) || DOC_MODEL;
                    if(art && label){
                        var span = document.createElement('span');
                        span.className = 'doc-model';
                        span.textContent = label;
                        art.appendChild(span);
                    }
                    // AI 연관 문서 추천 (knowledge-index.json). May arrive after
                    // this render, so injectRelated re-runs when the index loads.
                    CURRENT_DOC = filename;
                    injectRelated();
                    hydrateAiMap();
                })
            })
        }

        // ---- AI knowledge index (structural embedding) ----
        var KNOWLEDGE = null;        // name -> {summary, concepts, related:[...]}
        var KNOWLEDGE_STATS = null;  // aggregated stats from the same index
        var CURRENT_DOC = null;      // the doc currently in the content pane, or null
        // Jump to unified search pre-filled with a concept — the "click a
        // concept anywhere, search by meaning" pivot. showSearch consumes it.
        var PENDING_QUERY = '';
        function searchConcept(el){
            PENDING_QUERY = el.getAttribute('data-c') || '';
            if(location.hash === '#!search'){
                var box = document.getElementById('search-input');
                if(box){ box.value = PENDING_QUERY; box.focus(); renderSearchResults(PENDING_QUERY); }
                PENDING_QUERY = '';
                return;
            }
            location.hash = '#!search';
        }
        function conceptBtn(c){
            return '<button type="button" class="rel-c" data-c="' + escapeHtml(c)
                 + '" onclick="searchConcept(this)">' + escapeHtml(c) + '</button>';
        }
        function renderRelatedHTML(rel){
            var items = rel.map(function(r){
                var why = (r.shared && r.shared.length)
                        ? r.shared.map(conceptBtn).join('')
                        : '<span class="rel-why-plain">같은 폴더</span>';
                return '<li><a href="#!' + encodeURIComponent(r.name) + '">'
                     + escapeHtml(r.title) + '</a>'
                     + '<span class="rel-why">' + why + '</span></li>';
            }).join('');
            return '<nav class="related" aria-label="연관 문서">'
                 + '<h3 class="related-title">연관 문서</h3>'
                 + '<ul class="related-list">' + items + '</ul></nav>';
        }
        function injectRelated(){
            if(!KNOWLEDGE || !CURRENT_DOC){ return; }
            var art = document.getElementById('article');
            if(!art || art.querySelector('.related')){ return; }
            var info = KNOWLEDGE[CURRENT_DOC];
            if(!info || !info.related || !info.related.length){ return; }
            var wrap = document.createElement('div');
            wrap.innerHTML = renderRelatedHTML(info.related);
            var node = wrap.firstChild;
            var badge = art.querySelector('.doc-model');
            if(badge){ art.insertBefore(node, badge); } else { art.appendChild(node); }
        }

        // ---- 지식 지도 라이브 집계 ----
        // The 지식 지도 page carries static fallback numbers; when the index is
        // loaded we overwrite them with live aggregation so the map can never
        // drift from knowledge-index.json. Runs on both orders (doc first /
        // index first) — whichever completes last does the hydration.
        function docLink(name, title){
            return '<a href="#!' + encodeURIComponent(name) + '">' + escapeHtml(title) + '</a>';
        }
        function hydrateAiMap(){
            var s = KNOWLEDGE_STATS;
            if(!s || CURRENT_DOC !== 'ai-map'){ return; }
            var el = document.getElementById('km-clusters');
            if(el){
                var topics = {};
                try{ topics = JSON.parse(el.getAttribute('data-topics')) || {}; }catch(e){}
                el.innerHTML = s.clusters.map(function(c){
                    return '<tr><td><strong>' + escapeHtml(c.label) + '</strong></td>'
                         + '<td>' + c.count + '</td>'
                         + '<td>' + escapeHtml(topics[c.label] || '') + '</td>'
                         + '<td>' + docLink(c.hub.name, c.hub.title) + '</td></tr>';
                }).join('');
            }
            el = document.getElementById('km-hubs');
            if(el){
                // Group hubs by reference count, one line per count.
                var byRefs = {};
                s.hubs.forEach(function(h){ (byRefs[h.refs] = byRefs[h.refs] || []).push(h); });
                el.innerHTML = Object.keys(byRefs).sort(function(a, b){ return b - a; })
                    .map(function(n){
                        var links = byRefs[n].map(function(h){ return docLink(h.name, h.title); }).join(' · ');
                        var label = byRefs[n].length > 1 ? '각 ' + n + '회' : n + '회 연결';
                        return '<li>' + links + ' <span class="scn-sub">· ' + label + '</span></li>';
                    }).join('');
            }
            el = document.getElementById('km-bridges');
            if(el){
                el.innerHTML = s.bridges.map(function(b){
                    return '<tr><td><strong>' + escapeHtml(b.c) + '</strong></td>'
                         + '<td>' + b.clusters.length + '개 — ' + b.clusters.map(escapeHtml).join(' · ') + '</td>'
                         + '<td>' + b.n + '편</td></tr>';
                }).join('');
            }
            el = document.getElementById('km-top');
            if(el){
                el.innerHTML = s.topConcepts.filter(function(t){ return t.n >= 5; })
                    .map(function(t){ return conceptBtn(t.c) + ' <span class="km-n">' + t.n + '</span>'; })
                    .join(' ');
            }
            el = document.getElementById('km-totals');
            if(el){
                el.textContent = '전체 ' + s.docCount + '편 · 고유 개념 ' + s.conceptCount + '개.';
            }
        }

        // ---- 지식 코스모스: the knowledge graph as a 3D constellation ----
        // Every doc is a star, placed near its cluster's direction on a
        // sphere; related[] links are the constellation lines. Drag to
        // rotate, wheel to zoom, click a star to open that doc.
        function showCosmos(){
            var html =
                '<div class="cosmos-screen">'
              +   '<canvas class="cosmos-canvas"></canvas>'
              +   '<div class="cosmos-hud">'
              +     '<h2 class="cosmos-head">&#10022; Knowledge Graph</h2>'
              +     '<p class="cosmos-sub">지식 인덱스의 연관 관계를 3차원 별자리로 &mdash; 드래그 회전 &middot; 휠 확대 &middot; 별을 클릭하면 그 문서로</p>'
              +   '</div>'
              + '</div>';
            setArticle(html);
            startCosmos();
        }
        function startCosmos(){
            var canvas = document.querySelector('.cosmos-canvas');
            if(!canvas || !canvas.getContext){ return; }
            var ctx = canvas.getContext('2d');
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var W = 0, H = 0;
            function resize(){
                var r = canvas.parentNode.getBoundingClientRect();
                W = r.width; H = r.height;
                canvas.width = W * dpr; canvas.height = H * dpr;
                canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            window.addEventListener('resize', resize);
            // The stage also changes size without a window resize — the
            // sidebar slide morphs the content card — so track the pane
            // itself and follow its width through the whole transition.
            var ro = null;
            if(window.ResizeObserver){
                ro = new ResizeObserver(resize);
                ro.observe(canvas.parentNode);
            }
            resize();

            // Deterministic per-doc placement (stable across visits).
            function hash(s){
                var h = 2166136261;
                for(var i = 0; i < s.length; i++){ h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
                return h;
            }
            function rnd(seed){ var x = Math.sin(seed) * 43758.5453; return x - Math.floor(x); }
            function unit(seed){
                var u = rnd(seed) * 2 - 1, t = rnd(seed * 3.7) * 6.2832, r = Math.sqrt(1 - u * u);
                return [r * Math.cos(t), u, r * Math.sin(t)];
            }

            var nodes = null, edges = null, galaxies = null, maxRef = 1;
            function build(){
                if(!KNOWLEDGE){ return false; }
                var names = Object.keys(KNOWLEDGE);
                if(!names.length){ return false; }
                // Each 분류(section) is its OWN GALAXY: a compact star cloud
                // around a center, centers spread apart on a golden spiral so
                // the galaxies read as separate — related[] links become the
                // bridges between them.
                var secs = [];
                names.forEach(function(n){
                    var s = KNOWLEDGE[n].section || '';
                    if(secs.indexOf(s) === -1){ secs.push(s); }
                });
                secs.sort();
                var label_of = {};
                if(KNOWLEDGE_STATS && KNOWLEDGE_STATS.clusters){
                    KNOWLEDGE_STATS.clusters.forEach(function(c){ label_of[c.section] = c.label; });
                }
                var dirs = {};
                galaxies = [];
                secs.forEach(function(s, i){
                    var y = 1 - 2 * (i + 0.5) / secs.length;
                    var r = Math.sqrt(1 - y * y), t = i * 2.399963;
                    dirs[s] = [r * Math.cos(t), y, r * Math.sin(t)];
                    var parts = s.split(' · ');
                    galaxies.push({ label: label_of[s] || parts[parts.length - 1] || s,
                                    x: dirs[s][0], y: dirs[s][1], z: dirs[s][2],
                                    sx: 0, sy: 0, ss: 1 });
                });
                var indeg = {};
                names.forEach(function(n){
                    (KNOWLEDGE[n].related || []).forEach(function(rl){
                        indeg[rl.name] = (indeg[rl.name] || 0) + 1;
                    });
                });
                maxRef = 1;
                names.forEach(function(n){ if((indeg[n] || 0) > maxRef){ maxRef = indeg[n]; } });
                nodes = names.map(function(n){
                    var d = KNOWLEDGE[n], dir = dirs[d.section] || [0, 1, 0];
                    var h1 = hash(n), j = unit((h1 % 9973) + 1);
                    // A tight cloud (±0.26) around the galaxy center — no
                    // renormalizing onto one shared sphere, so galaxies with
                    // different 분류 stay visibly apart.
                    return { name: n, title: d.title,
                             x: dir[0] + j[0] * 0.26,
                             y: dir[1] + j[1] * 0.26,
                             z: dir[2] + j[2] * 0.26,
                             ref: indeg[n] || 0, sx: 0, sy: 0, ss: 1, sz: 0 };
                });
                var byName = {};
                nodes.forEach(function(nd, i){ byName[nd.name] = i; });
                var seen = {};
                edges = [];
                names.forEach(function(n){
                    (KNOWLEDGE[n].related || []).forEach(function(rl){
                        if(!(rl.name in byName)){ return; }
                        var a = byName[n], b = byName[rl.name];
                        var key = a < b ? a + '-' + b : b + '-' + a;
                        if(seen[key]){ return; }
                        seen[key] = 1;
                        edges.push([a, b, rl.via === 'folder' ? 0.4 : 1]);
                    });
                });
                window.COSMOS_COUNT = nodes.length;
                return true;
            }

            var rotY = 0.6, rotX = -0.25, zoom = 1, auto = true;
            var drag = null, hover = -1, moved = 0, lastTouch = 0;
            function pick(mx, my){
                if(!nodes){ return -1; }
                var best = -1, bd = 16 * 16;
                for(var i = 0; i < nodes.length; i++){
                    var dx = nodes[i].sx - mx, dy = nodes[i].sy - my, dd = dx * dx + dy * dy;
                    if(dd < bd){ bd = dd; best = i; }
                }
                return best;
            }
            canvas.addEventListener('pointerdown', function(e){
                drag = { x: e.clientX, y: e.clientY, ry: rotY, rx: rotX };
                moved = 0;
                try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
            });
            canvas.addEventListener('pointermove', function(e){
                lastTouch = performance.now();
                if(drag){
                    var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
                    moved = Math.max(moved, Math.abs(dx) + Math.abs(dy));
                    rotY = drag.ry + dx * 0.005;
                    rotX = Math.max(-1.4, Math.min(1.4, drag.rx + dy * 0.005));
                    auto = false;
                } else {
                    var r = canvas.getBoundingClientRect();
                    hover = pick(e.clientX - r.left, e.clientY - r.top);
                    canvas.style.cursor = hover >= 0 ? 'pointer' : 'grab';
                }
            });
            canvas.addEventListener('pointerup', function(e){
                if(drag && moved < 6){
                    var r = canvas.getBoundingClientRect();
                    var i = pick(e.clientX - r.left, e.clientY - r.top);
                    if(i >= 0){ location.hash = '#!' + nodes[i].name; }
                }
                drag = null;
            });
            canvas.addEventListener('pointercancel', function(){ drag = null; });
            canvas.addEventListener('wheel', function(e){
                e.preventDefault();
                lastTouch = performance.now();
                zoom = Math.max(0.5, Math.min(2.4, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
            }, { passive: false });

            function frame(){
                if(!canvas.isConnected){
                    window.removeEventListener('resize', resize);
                    if(ro){ ro.disconnect(); }
                    return;
                }
                ctx.clearRect(0, 0, W, H);
                var cs = getComputedStyle(document.body);
                var col = (cs.getPropertyValue('--accent') || '#ff6600').trim();
                var ink = (cs.getPropertyValue('--text') || '#333').trim();
                var mut = (cs.getPropertyValue('--muted') || '#888').trim();
                if(!nodes){
                    if(!build()){
                        ctx.fillStyle = mut;
                        ctx.font = '14px ' + GAME_FONT;
                        ctx.textAlign = 'center';
                        ctx.fillText('지식 인덱스를 불러오는 중…', W / 2, H / 2);
                        requestAnimationFrame(frame);
                        return;
                    }
                }
                // Auto-rotate, resuming a few seconds after the last touch.
                if(!drag && (auto || performance.now() - lastTouch > 5000)){
                    auto = true;
                    rotY += 0.0018;
                }
                var cy = Math.cos(rotY), sy = Math.sin(rotY);
                var cx = Math.cos(rotX), sx = Math.sin(rotX);
                var scale = Math.min(W, H) * 0.47 * zoom, f = 3.2;
                var midX = W / 2, midY = H * 0.54;
                function project(o){
                    var x = o.x * cy + o.z * sy, z = -o.x * sy + o.z * cy;
                    var y2 = o.y * cx - z * sx, z2 = o.y * sx + z * cx;
                    var pr = f / (f + z2);
                    o.sx = midX + x * scale * pr;
                    o.sy = midY + y2 * scale * pr;
                    o.ss = pr; o.sz = z2;
                }
                for(var i = 0; i < nodes.length; i++){ project(nodes[i]); }
                // Galaxy name plates — dim, behind everything.
                ctx.textAlign = 'center';
                for(var g = 0; g < galaxies.length; g++){
                    var gx = galaxies[g];
                    project(gx);
                    ctx.font = '700 ' + Math.round(15 * gx.ss) + 'px ' + GAME_FONT;
                    ctx.globalAlpha = Math.max(0.1, gx.ss * 0.22);
                    ctx.fillStyle = mut;
                    ctx.fillText(gx.label, gx.sx, gx.sy);
                }
                ctx.lineWidth = 1;
                for(var e2 = 0; e2 < edges.length; e2++){
                    var a = nodes[edges[e2][0]], b = nodes[edges[e2][1]];
                    var hi = hover >= 0 && (edges[e2][0] === hover || edges[e2][1] === hover);
                    ctx.globalAlpha = (hi ? 0.6 : 0.1) * ((a.ss + b.ss) / 2) * edges[e2][2];
                    ctx.strokeStyle = hi ? col : mut;
                    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
                }
                var order = nodes.map(function(_, k){ return k; })
                    .sort(function(p, q){ return nodes[q].sz - nodes[p].sz; });   // far → near
                for(var o = 0; o < order.length; o++){
                    var nd2 = nodes[order[o]];
                    var r2 = Math.max(2, (2.6 + nd2.ref / maxRef * 5.5) * nd2.ss);
                    ctx.globalAlpha = Math.max(0.18, Math.min(0.9, 0.25 + nd2.ss * 0.5));
                    ctx.fillStyle = col;
                    ctx.beginPath(); ctx.arc(nd2.sx, nd2.sy, r2, 0, 6.2832); ctx.fill();
                    if(order[o] === hover){
                        ctx.globalAlpha = 0.9;
                        ctx.strokeStyle = col; ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.arc(nd2.sx, nd2.sy, r2 + 5, 0, 6.2832); ctx.stroke();
                        ctx.lineWidth = 1;
                    }
                }
                // Labels: hubs stay named; the hovered star gets a bold label.
                ctx.textAlign = 'center';
                for(var L2 = 0; L2 < nodes.length; L2++){
                    var nd3 = nodes[L2];
                    if(L2 !== hover && nd3.ref < 6){ continue; }
                    ctx.font = (L2 === hover ? '700 14px ' : '600 12px ') + GAME_FONT;
                    ctx.globalAlpha = L2 === hover ? 1 : Math.max(0.25, nd3.ss * 0.55);
                    ctx.fillStyle = ink;
                    ctx.fillText(nd3.title, nd3.sx, nd3.sy - (8 + nd3.ref / maxRef * 5));
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        // ---- Tag index (all tags) with instant search ----
        function showTagIndex(){
            var html = '<h2>Tags</h2>'
                     + '<input id="tag-search" type="search" placeholder="Search tags..."'
                     + ' oninput="filterTags(this.value)" autocomplete="off">'
                     + '<div id="tag-top"></div>'
                     + '<div id="tag-cloud"></div>';
            setArticle(html);
            renderTopTags();
            filterTags('');
            var box = document.getElementById('tag-search');
            if(box){ box.focus(); }
        }

        // Highlighted band of the most-used tags, ordered by the top-10
        // ranking and showing only the tag words. Top-3 keep medal colors.
        function renderTopTags(){
            var ranks = topTagRanks();
            var ranked = Object.keys(ranks);
            var el = document.getElementById('tag-top');
            if(!el){ return; }
            if(!ranked.length){ el.innerHTML = ''; return; }
            ranked.sort(function(a, b){ return ranks[a] - ranks[b]; });
            var html = '<h3 class="idx-top-title">많이 쓰인 태그</h3>'
                     + '<ol class="idx-top-list">';
            ranked.forEach(function(t){
                html += '<li><a class="idx-top-item top-' + ranks[t] + '"'
                     +  ' href="#!tag:' + encodeURIComponent(t) + '">'
                     +  escapeHtml(t)
                     +  '</a></li>';
            });
            html += '</ol>';
            el.innerHTML = html;
        }

        // Initial-letter buckets for the index. English tags group under
        // A-Z; Korean tags group under their leading consonant (초성), with
        // the doubled consonants folded onto their base (ㄲ→ㄱ, ㅃ→ㅂ, ...).
        var HANGUL_CHO = ['ㄱ','ㄱ','ㄴ','ㄷ','ㄷ','ㄹ','ㅁ','ㅂ','ㅂ','ㅅ',
                          'ㅅ','ㅇ','ㅈ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        var CHO_ORDER = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ',
                         'ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        function tagInitial(tag){
            var ch = tag.charAt(0);
            var code = ch.charCodeAt(0);
            if(code >= 0xAC00 && code <= 0xD7A3){   // a composed Hangul syllable
                return HANGUL_CHO[Math.floor((code - 0xAC00) / 588)];
            }
            var up = ch.toUpperCase();
            return (up >= 'A' && up <= 'Z') ? up : '#';
        }
        // Order buckets as A-Z first, then the Korean consonants, then '#'.
        function initialRank(k){
            if(k >= 'A' && k <= 'Z'){ return [0, k.charCodeAt(0)]; }
            var ci = CHO_ORDER.indexOf(k);
            return ci >= 0 ? [1, ci] : [2, 0];
        }

        // Group the (optionally filtered) tags by initial and lay them out
        // like the index at the back of a dictionary. The top-10 usage ranks
        // still drive the emphasis on each entry.
        function filterTags(query){
            var q = query.trim().toLowerCase();
            var tags = Object.keys(TAG_INDEX).sort(function(a, b){
                return a.toLowerCase().localeCompare(b.toLowerCase(), 'ko');
            });
            var ranks = topTagRanks();
            var groups = {}, letters = [];
            tags.forEach(function(t){
                if(q && t.toLowerCase().indexOf(q) === -1){ return; }
                var k = tagInitial(t);
                if(!groups[k]){ groups[k] = []; letters.push(k); }
                groups[k].push(t);
            });
            letters.sort(function(a, b){
                var ra = initialRank(a), rb = initialRank(b);
                return ra[0] - rb[0] || ra[1] - rb[1];
            });
            var html = '';
            letters.forEach(function(k){
                html += '<section class="idx-group">'
                     +  '<h3 class="idx-letter">' + escapeHtml(k) + '</h3>'
                     +  '<div class="idx-list">';
                groups[k].forEach(function(t){
                    html += tagIndexEntry(t, TAG_INDEX[t].length, ranks[t]);
                });
                html += '</div></section>';
            });
            if(!html){ html = '<p class="empty">No matching tags.</p>'; }
            var cloud = document.getElementById('tag-cloud');
            if(cloud){ cloud.innerHTML = html; }
            // The "most used" band belongs to the full index, not a search.
            var top = document.getElementById('tag-top');
            if(top){ top.style.display = q ? 'none' : ''; }
        }

        // ---- Docs for a single tag ----
        function showTag(tag){
            var docs = TAG_INDEX[tag] || [];
            var html = '<h2>' + escapeHtml(tag) + '</h2>'
                     + '<p class="tag-back"><a href="#!tags">&larr; All tags</a></p>'
                     + '<ul class="more-list">';
            docs.forEach(function(d){
                html += '<li><a href="#!' + d.name + '">'
                     +  '<span class="more-name">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="more-meta">' + escapeHtml(d.section) + '</span></a></li>';
            });
            html += '</ul>';
            setArticle(html);
        }

        // ---- Folder digest: every direct doc of a folder on one page ----
        // Fetches the folder's docs in reading order and concatenates their
        // bodies, with a jump-to table of contents. No tags / model badge.
        function showFolder(section){
            var docs = FOLDER_DOCS[section] || [];
            var parts = section.split(' · ');
            var title = parts[parts.length - 1] || section;
            if(!docs.length){
                setArticle('<h2>' + escapeHtml(title) + '</h2>'
                         + '<p class="empty">이 폴더에는 모아 볼 문서가 없습니다.</p>');
                return;
            }
            var toc = '<div class="folder-head">'
                    + '<h2>' + escapeHtml(title) + '</h2>'
                    + '<p class="folder-sub">' + escapeHtml(section)
                    + ' · 문서 ' + docs.length + '개</p>'
                    + '<ol class="folder-toc">';
            docs.forEach(function(d, i){
                // Buttons (not #anchors) so jumping doesn't trigger the router.
                toc += '<li><button type="button" class="folder-toc-link"'
                     + ' onclick="scrollFolderDoc(' + i + ')">'
                     + escapeHtml(d.label) + '</button></li>';
            });
            toc += '</ol></div>';
            setArticle(toc + '<div class="folder-body"><p class="empty">불러오는 중…</p></div>');
            Promise.all(docs.map(function(d){
                return fetch(d.name).then(function(r){ return r.ok ? r.text() : ''; })
                                    .catch(function(){ return ''; });
            })).then(function(texts){
                var html = '';
                docs.forEach(function(d, i){
                    // Each doc already opens with its own heading, so no extra
                    // numbered title here (it would duplicate). The section id
                    // still anchors the table-of-contents jump.
                    html += '<section class="folder-doc" id="folder-doc-' + i + '">'
                         +  texts[i]
                         +  '</section>';
                });
                var body = document.querySelector('.folder-body');
                if(body){ body.innerHTML = html; initCarousels(body); }
            });
        }

        // Smooth-scroll a folder-digest section into view (works whether the
        // scroller is #content-scroll or the window).
        function scrollFolderDoc(i){
            var el = document.getElementById('folder-doc-' + i);
            if(el){ el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        }

        // ---- Unified search screen (landing page & title click) ----
        // Full-text index over the doc bodies, built lazily in the background
        // the first time the search screen opens.
        var DOC_TEXT = {};        // name -> lowercased plain-text body (matching)
        var DOC_TEXT_RAW = {};    // name -> plain-text body, original case (snippets)
        var TEXT_INDEX_READY = false;
        var textIndexStarted = false;

        // Work Log entries are dev journal, not reference content — keep them
        // out of the unified search (results and the body index alike).
        function isSearchableDoc(d){
            return d.section.indexOf('Work Log') !== 0;
        }

        // Turn a doc's HTML into searchable plain text. Bodies carry only
        // inline SVG (no external <img>), so a detached element is safe and
        // its textContent also captures diagram labels.
        function stripHtml(html){
            var d = document.createElement('div');
            d.innerHTML = html;
            return (d.textContent || '').replace(/\s+/g, ' ').trim();
        }

        function buildTextIndex(){
            return Promise.all(DOCS.filter(isSearchableDoc).map(function(d){
                return fetch(d.name).then(function(r){
                    return r.ok ? r.text() : '';
                }).then(function(t){
                    var txt = stripHtml(t);
                    DOC_TEXT_RAW[d.name] = txt;
                    DOC_TEXT[d.name] = txt.toLowerCase();
                }).catch(function(){});
            })).then(function(){
                TEXT_INDEX_READY = true;
                // Re-run the current query now that bodies are searchable.
                var box = document.getElementById('search-input');
                if(box && box.value.trim()){ renderSearchResults(box.value); }
            });
        }

        function ensureTextIndex(){
            if(textIndexStarted){ return; }
            textIndexStarted = true;
            buildTextIndex();
        }

        // Concept-aware ranked search. Every term must still match somewhere
        // (label / section / tags / AI concepts / AI summary / body), but hits
        // are SCORED and ranked so meaning-level matches (the knowledge index's
        // concepts) rise above incidental body mentions. Returns
        // [{d, score, concepts:[matched concept names]}], best first.
        // Field weights: concept 5 (exact 8) > label 4 > tag 3 > summary/section 2 > body 1.
        function searchDocs(query){
            var q = query.trim().toLowerCase();
            if(!q){ return []; }
            var terms = q.split(/\s+/);
            var out = [];
            DOCS.forEach(function(d){
                if(!isSearchableDoc(d)){ return; }
                var info = KNOWLEDGE ? KNOWLEDGE[d.name] : null;
                var concepts = (info && info.concepts) || [];
                var conceptsLow = concepts.map(function(c){ return c.toLowerCase(); });
                var label = d.label.toLowerCase();
                var section = d.section.toLowerCase();
                var tagsLow = d.tags.join(' ').toLowerCase();
                var summaryLow = ((info && info.summary) || '').toLowerCase();
                var body = DOC_TEXT[d.name] || '';
                var score = 0, matched = [], ok = true;
                terms.forEach(function(t){
                    var s = 0;
                    for(var i = 0; i < conceptsLow.length; i++){
                        if(conceptsLow[i].indexOf(t) !== -1){
                            s = Math.max(s, conceptsLow[i] === t ? 8 : 5);
                            if(matched.indexOf(concepts[i]) === -1){ matched.push(concepts[i]); }
                        }
                    }
                    if(label.indexOf(t) !== -1){ s = Math.max(s, 4); }
                    if(tagsLow.indexOf(t) !== -1){ s = Math.max(s, 3); }
                    if(summaryLow.indexOf(t) !== -1){ s = Math.max(s, 2); }
                    if(section.indexOf(t) !== -1){ s = Math.max(s, 2); }
                    if(body.indexOf(t) !== -1){ s = Math.max(s, 1); }
                    if(s === 0){ ok = false; }
                    score += s;
                });
                if(ok && score > 0){ out.push({ d: d, score: score, concepts: matched }); }
            });
            out.sort(function(a, b){ return b.score - a.score; });
            return out;
        }

        // Concept names containing the query — offered as one-tap pivots so a
        // user can search by meaning (the wiki's shared vocabulary).
        var ALL_CONCEPTS = [];
        function buildConceptIndex(){
            var set = {};
            Object.keys(KNOWLEDGE || {}).forEach(function(n){
                ((KNOWLEDGE[n] && KNOWLEDGE[n].concepts) || []).forEach(function(c){ set[c] = true; });
            });
            ALL_CONCEPTS = Object.keys(set).sort(function(a, b){ return a.localeCompare(b, 'ko'); });
        }
        function conceptSuggestions(query){
            var q = query.trim().toLowerCase();
            if(!q || !ALL_CONCEPTS.length){ return []; }
            return ALL_CONCEPTS.filter(function(c){
                var cl = c.toLowerCase();
                return cl.indexOf(q) !== -1 && cl !== q;   // skip the exact-typed one
            }).slice(0, 6);
        }
        function pickConcept(el){
            var box = document.getElementById('search-input');
            if(box){ box.value = el.getAttribute('data-c'); box.focus(); renderSearchResults(box.value); }
        }

        // Wrap each search term in <mark>, matching against the RAW text (so
        // terms like "amp"/"lt" don't hit HTML entities), then escape each
        // segment. Case-insensitive; overlapping matches merged.
        function highlightTerms(text, terms){
            var lower = text.toLowerCase(), ranges = [];
            terms.forEach(function(t){
                if(!t){ return; }
                t = t.toLowerCase();
                var i = 0, p;
                while((p = lower.indexOf(t, i)) !== -1){ ranges.push([p, p + t.length]); i = p + t.length; }
            });
            if(!ranges.length){ return escapeHtml(text); }
            ranges.sort(function(a, b){ return a[0] - b[0]; });
            var merged = [];
            ranges.forEach(function(r){
                var last = merged[merged.length - 1];
                if(last && r[0] <= last[1]){ last[1] = Math.max(last[1], r[1]); }
                else { merged.push(r.slice()); }
            });
            var out = '', pos = 0;
            merged.forEach(function(r){
                out += escapeHtml(text.slice(pos, r[0]))
                     + '<mark>' + escapeHtml(text.slice(r[0], r[1])) + '</mark>';
                pos = r[1];
            });
            return out + escapeHtml(text.slice(pos));
        }

        // A short body excerpt around the first matching term, highlighted.
        // Empty when the match was only in the label/section/tags.
        function makeSnippet(name, terms){
            var low = DOC_TEXT[name], raw = DOC_TEXT_RAW[name];
            if(!low || !raw){ return ''; }
            var pos = -1;
            terms.forEach(function(t){
                var p = t ? low.indexOf(t) : -1;
                if(p !== -1 && (pos === -1 || p < pos)){ pos = p; }
            });
            if(pos === -1){ return ''; }
            var start = Math.max(0, pos - 40);
            var end = Math.min(raw.length, pos + 80);
            return (start > 0 ? '…' : '') + highlightTerms(raw.slice(start, end), terms)
                 + (end < raw.length ? '…' : '');
        }

        var SEARCH_LIMIT = 8;
        function renderSearchResults(query){
            var box = document.getElementById('search-results');
            if(!box){ return; }
            paddleReset();   // typing = searching: glide the field back home
            var q = query.trim();
            if(!q){ box.innerHTML = ''; box.classList.remove('open'); return; }
            var terms = q.toLowerCase().split(/\s+/);
            var hits = searchDocs(query);
            var indexing = !TEXT_INDEX_READY
                         ? '<p class="search-indexing">본문 색인을 불러오는 중… (제목·태그·개념 우선)</p>' : '';
            // Meaning-level pivots: concepts the query partially names.
            var suggests = conceptSuggestions(query);
            var suggestHtml = '';
            if(suggests.length){
                suggestHtml = '<div class="sh-suggests"><span class="sh-suggests-label">관련 개념</span>';
                suggests.forEach(function(c){
                    suggestHtml += '<button type="button" class="sh-suggest" data-c="'
                                +  escapeHtml(c) + '" onclick="pickConcept(this)">'
                                +  escapeHtml(c) + '</button>';
                });
                suggestHtml += '</div>';
            }
            if(!hits.length){
                box.innerHTML = suggestHtml
                              + '<p class="search-empty">&ldquo;' + escapeHtml(q)
                              + '&rdquo;에 대한 결과가 없습니다.</p>' + indexing;
                box.classList.add('open');
                return;
            }
            var html = suggestHtml;
            hits.slice(0, SEARCH_LIMIT).forEach(function(h){
                var d = h.d;
                html += '<a class="search-hit" href="#!' + d.name + '">'
                     +  '<span class="sh-label">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="sh-meta">' + escapeHtml(d.section) + '</span>';
                // Which concept(s) matched — the "semantic" signal.
                if(h.concepts.length){
                    html += '<span class="sh-concepts">';
                    h.concepts.slice(0, 3).forEach(function(c){
                        html += '<span class="sh-concept">' + escapeHtml(c) + '</span>';
                    });
                    html += '</span>';
                }
                // Body snippet around the match; else fall back to the AI summary.
                var snip = makeSnippet(d.name, terms);
                if(snip){
                    html += '<span class="sh-snippet">' + snip + '</span>';
                } else {
                    var info = KNOWLEDGE && KNOWLEDGE[d.name];
                    if(info && info.summary){
                        html += '<span class="sh-summary">' + escapeHtml(info.summary) + '</span>';
                    }
                }
                if(d.tags.length){
                    html += '<span class="sh-tags">';
                    d.tags.slice(0, 4).forEach(function(t){
                        html += '<span class="sh-tag">' + escapeHtml(t) + '</span>';
                    });
                    html += '</span>';
                }
                html += '</a>';
            });
            if(hits.length > SEARCH_LIMIT){
                html += '<p class="search-more">외 ' + (hits.length - SEARCH_LIMIT) + '개 더…</p>';
            }
            box.innerHTML = html + indexing;
            box.classList.add('open');
        }

        function showSearch(){
            var html =
                '<div class="search-screen">'
              +   '<div class="search-bg" aria-hidden="true">'
              +     '<span class="blob b1"></span><span class="blob b2"></span>'
              +     '<span class="blob b3"></span><span class="blob b4"></span>'
              +   '</div>'
              +   '<canvas class="search-game" aria-hidden="true"></canvas>'
              +   '<div class="search-core">'
              +     '<h2 class="search-head">무엇을 찾으세요?</h2>'
              +     '<p class="search-sub">Claude Code · 플러그인 · 하네스 · 세컨드 브레인</p>'
              +     '<div class="search-field">'
              +       '<span class="search-ico" aria-hidden="true">&#128269;</span>'
              +       '<input id="search-input" type="search" autocomplete="off"'
              +         ' placeholder="제목 · 태그 · 개념 · 본문을 검색…"'
              +         ' oninput="renderSearchResults(this.value)">'
              +     '</div>'
              +     '<div id="search-results"></div>'
              +   '</div>'
              +   (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches ? '' :
                  '<div class="game-dock" role="group" aria-label="미니게임 선택">'
                +   '<button type="button" data-g="breakout" title="벽돌깨기" aria-label="벽돌깨기" onclick="switchSearchGame(this)">'

            setArticle(html);
            ensureTextIndex();   // start fetching doc bodies in the background
            startSearchGame();   // ambient mini game behind the field
            enableSearchPaddle();   // drag the field left/right like a paddle

            if(box){
                box.focus();
                // A concept chip was clicked somewhere — run that search now.
                if(PENDING_QUERY){
