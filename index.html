<!doctype html>
<html>
    <head>
    <title>Aaron's Claude Wiki</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Claude Code·플러그인·하네스·LLM Wiki·세컨드 브레인을 다루는 dewytear의 한글 위키.">
    <!-- Structured data: advertise the machine-readable knowledge graph so an
         AI/crawler discovers the traversal entry points (llms.txt + graph JSON). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://dewytear.github.io/#website",
          "name": "Aaron's Claude Wiki",
          "url": "https://dewytear.github.io/",
          "inLanguage": "ko",
          "description": "Claude Code·플러그인·하네스·LLM Wiki·세컨드 브레인을 다루는 dewytear의 한글 위키."
        },
        {
          "@type": "Dataset",
          "name": "Aaron's Claude Wiki — Knowledge Graph",
          "description": "문서(노드)와 개념·연관관계(엣지)를 담은 자기완결 지식 그래프. 순회 가이드 참조.",
          "url": "https://dewytear.github.io/docs/ko/ai/map/ai-guide",
          "isAccessibleForFree": true,
          "creator": { "@type": "Person", "name": "dewytear" },
          "distribution": [
            { "@type": "DataDownload", "encodingFormat": "application/json",
              "contentUrl": "https://dewytear.github.io/data/knowledge-graph.json" },
            { "@type": "DataDownload", "encodingFormat": "text/plain",
              "contentUrl": "https://dewytear.github.io/llms.txt" }
          ]
        }
      ]
    }
    </script>
    <!-- Tint the mobile browser chrome to match the active theme. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1b2230" media="(prefers-color-scheme: dark)">
    <!-- Pretendard: one family that harmonizes Latin and Hangul -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <!-- ?v= cache-buster: bump on any change to these files so browsers
         (esp. iOS Safari, which caches past max-age) fetch the new version. -->
    <link rel="stylesheet" href="style.css?v=25">
    <link rel="stylesheet" href="folder-dates.css?v=2">
    <script src="colors.js?v=2"></script>
    <script src="graphviews.js?v=2"></script>
    <script src="core.js?v=3"></script>
    <script src="utils.js?v=1"></script>
    <script src="i18n.js?v=10"></script>
    <script src="cosmos.js?v=4"></script>
    <script src="search.js?v=5"></script>
    <script src="games.js?v=2"></script>
    </head>

<body>
    <div id="nav-backdrop" onclick="toggleNav();"></div>
    <div id="grid">
        <aside id="sidebar">
            <div id="profile">
                <a id="profile-link" href="#!about" aria-label="About — 소개 페이지로 이동">
                    <img id="profile-img" src="profile.jpg" alt="Profile"
                         onerror="if(this.src.indexOf('profile.svg') === -1){ this.src = 'profile.svg'; }">
                    <p id="profile-tagline"><span class="ptl-text">Wanna fly with me</span> <span class="pf-arrow" aria-hidden="true">&#8599;</span></p>
                </a>
            </div>
            <nav id="navigation"></nav>
            <div id="sidebar-foot">
                <a id="tags-link" href="#!tags">
                    <span class="settings-ico">&#127991;</span>Tags
                </a>
                <label id="theme-switch" title="Day / Night 전환">
                    <span class="theme-ico moon">&#9790;</span>
                    <input type="checkbox" id="theme-toggle" onchange="nightDayHandler(this);">
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                    <span class="theme-ico sun">&#9728;</span>
                </label>
                <a id="settings-link" href="#!settings" title="설정" aria-label="설정">
                    <span class="settings-ico">&#9881;</span>
                </a>
            </div>
        </aside>
        <main id="content">
            <header id="masthead">
                <button id="nav-toggle" onclick="toggleNav();" aria-label="Toggle navigation"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="3"/><line x1="9.5" y1="4" x2="9.5" y2="20"/></svg></button>
                <h1><a href="#!search">Aaron's Claude Wiki</a></h1>
                <p id="tagline">: A guide to Aaron's Claude Project.</p>
            </header>
            <div id="content-scroll">
                <div id="article">
                    <article>
                    </article>
                </div>
                <section id="more"></section>
            </div>
        </main>
    </div>

    <!-- Floating background-music control -->
    <button id="music-btn" type="button" class="idle" onclick="toggleMusic();"
            aria-label="배경음악 재생" title="배경음악">
        <span class="music-eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    </button>
    <div id="yt-music" aria-hidden="true"></div>

    <script>

        // Apply the theme as early as possible (light is the default) so the
        // page doesn't flash the dark theme before settings load.
        (function(){
            try{
                var s = JSON.parse(localStorage.getItem('wikiSettings')) || {};
                if((s.theme || 'day') === 'day'){ document.body.classList.add('day'); }
            }catch(e){ document.body.classList.add('day'); }
            // Desktop sidebar: HIDDEN by default on first visit; only an
            // explicit expand ('0') keeps it open. The class only takes
            // effect on wide screens (scoped in CSS).
            try{
                if(localStorage.getItem('navCollapsed') !== '0'){
                    document.body.classList.add('nav-collapsed');
                }
            }catch(e){ document.body.classList.add('nav-collapsed'); }
        })();


    </script>
    <script src="app.js?v=28"></script>
    <script src="folder-dates.js?v=1"></script>
    <script src="music.js?v=1"></script>
</body>
</html>
