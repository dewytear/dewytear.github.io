<!doctype html>
<html>
    <head>
    <title>dewytear's claude wiki</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Claude Code·플러그인·하네스·LLM Wiki·세컨드 브레인을 다루는 dewytear의 한글 위키.">
    <!-- Tint the mobile browser chrome to match the active theme. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1b2230" media="(prefers-color-scheme: dark)">
    <!-- Pretendard: one family that harmonizes Latin and Hangul -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="colors.js"></script>
    </head>

<body>
    <div id="nav-backdrop" onclick="toggleNav();"></div>
    <div id="grid">
        <aside id="sidebar">
            <div id="profile">
                <img id="profile-img" src="profile.jpg" alt="Profile"
                     onerror="if(this.src.indexOf('profile.svg') === -1){ this.src = 'profile.svg'; }">
                <p id="profile-tagline"><span class="ptl-text">Wanna fly with me</span> <span class="pf-arrow" aria-hidden="true">&#8599;</span></p>
            </div>
            <nav id="navigation"></nav>
            <div id="sidebar-foot">
                <a id="tags-link" href="#!tags">
                    <span class="settings-ico">&#127991;</span>Tags
                </a>
                <label id="theme-switch" title="Day / Night 전환">
                    <span class="theme-ico moon">&#9790;</span>
                    <input type="checkbox" id="theme-toggle" onchange="nightDayHandler(this);">
                    <span class="switch-track"><span class="switch-thumb"></span></span>
                    <span class="theme-ico sun">&#9728;</span>
                </label>
                <a id="settings-link" href="#!settings" title="설정" aria-label="설정">
                    <span class="settings-ico">&#9881;</span>
                </a>
            </div>
        </aside>
        <main id="content">
            <header id="masthead">
                <button id="nav-toggle" onclick="toggleNav();" aria-label="Toggle navigation">&#9776;</button>
                <h1><a href="#!search">dewytear's claude wiki</a></h1>
                <p id="tagline">: A guide to Anthropic's Claude Code.</p>
            </header>
            <div id="content-scroll">
                <div id="article">
                    <article>
                    </article>
                </div>
                <section id="more"></section>
            </div>
        </main>
    </div>

    <!-- Floating background-music control -->
    <button id="music-btn" type="button" class="idle" onclick="toggleMusic();"
            aria-label="배경음악 재생" title="배경음악">
        <span class="music-eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    </button>
    <div id="yt-music" aria-hidden="true"></div>

    <script>

        // Apply the theme as early as possible (light is the default) so the
        // page doesn't flash the dark theme before settings load.
        (function(){
            try{
                var s = JSON.parse(localStorage.getItem('wikiSettings')) || {};
                if((s.theme || 'day') === 'day'){ document.body.classList.add('day'); }
            }catch(e){ document.body.classList.add('day'); }
        })();

        // ---- Global indexes (built once the list loads) ----
        var DOCS = [];         // real docs: {name, label, section, tags:[]}
        var TAG_INDEX = {};    // tag -> [doc, ...]
        var DOC_BY_NAME = {};  // name -> doc
        var FOLDER_DOCS = {};  // section (parent-folder path) -> [doc, ...] in tree order
        var DOC_MODEL = 'Claude Fable 5';   // default authoring-model badge (no icon)

        function buildIndexes(tree){
            (function walk(nodes, path){
                nodes.forEach(function(node){
                    if(node.children && node.children.length){
                        walk(node.children, node.title ? path.concat(node.title) : path);
                    } else if(node.name && !node.route){
                        var doc = {
                            name: node.name,
                            label: node.label || node.name,
                            section: path.join(' · '),
                            tags: node.tags || [],
                            model: node.model || ''   // optional per-doc override
                        };
                        DOCS.push(doc);
                        DOC_BY_NAME[doc.name] = doc;
                        // Group by immediate parent folder, in tree order. Kept
                        // separate from DOCS so the later date-sort of DOCS
                        // doesn't reorder a folder's own reading sequence.
                        (FOLDER_DOCS[doc.section] = FOLDER_DOCS[doc.section] || []).push(doc);
                        doc.tags.forEach(function(t){
                            (TAG_INDEX[t] = TAG_INDEX[t] || []).push(doc);
                        });
                    }
                });
            })(tree, []);
        }

        function escapeHtml(s){
            return String(s).replace(/[&<>"]/g, function(c){
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
            });
        }

        // ---- Navigation tree ----
        // A folder with 2+ direct docs (Work Log excluded) gets a digest icon
        // that shows all its docs on one page. It rides inside the title button
        // as a flex child (stopPropagation keeps it from toggling the branch),
        // which aligns it cleanly at every nesting level. `path` mirrors
        // buildIndexes so the folder's section key matches FOLDER_DOCS.
        function folderDigestSpan(sectionKey){
            var docs = FOLDER_DOCS[sectionKey];
            if(!docs || docs.length < 2 || sectionKey.indexOf('Work Log') === 0){ return ''; }
            return '<span class="folder-digest" role="button" tabindex="0"'
                 + ' title="이 폴더 문서 모아보기" aria-label="이 폴더 문서 모아보기"'
                 + ' data-section="' + escapeHtml(sectionKey) + '"'
                 + ' onclick="openFolderDigest(event, this)"'
                 + ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openFolderDigest(event,this);}">&#128220;</span>';
        }
        function openFolderDigest(ev, el){
            ev.stopPropagation();   // don't toggle the branch
            location.hash = '#!folder:' + encodeURIComponent(el.getAttribute('data-section'));
        }
        function renderNodes(nodes, path){
            path = path || [];
            var html = '<ul>';
            var docSeq = 0;   // numbers the docs within this branch, per folder
            nodes.forEach(function(node){
                var label = node.label || node.title || node.name;
                if(node.children){    // a branch, collapsed by default
                    var childPath = node.title ? path.concat(node.title) : path;
                    // Tag top-level categories so Settings can show/hide them.
                    var catAttr = (path.length === 0 && node.title)
                                ? ' data-cat="' + escapeHtml(node.title) + '"' : '';
                    html += '<li class="nav-branch collapsed"' + catAttr + '>'
                         +  '<button type="button" class="nav-title" onclick="toggleBranch(this)">'
                         +  '<span class="nav-caret">&#9662;</span>'
                         +  '<span class="nav-title-text">' + escapeHtml(label) + '</span>'
                         +  folderDigestSpan(childPath.join(' · '))
                         +  '</button>';
                    html += renderNodes(node.children, childPath);
                    html += '</li>';
                } else {
                    var target = node.route ? node.route : node.name;
                    var numHtml;
                    if(node.mark){
                        // A marked doc (e.g. a guide) shows a symbol, not a
                        // sequence number, and doesn't consume the count.
                        numHtml = '<span class="doc-num doc-mark">' + escapeHtml(node.mark) + '</span>';
                    } else {
                        docSeq++;
                        var num = (docSeq < 10 ? '0' : '') + docSeq;
                        numHtml = '<span class="doc-num">' + num + '.</span>';
                    }
                    html += '<li><a href="#!' + target + '">'
                         +  numHtml + ' ' + escapeHtml(label) + '</a></li>';
                }
            });
            html += '</ul>';
            return html;
        }

        // ---- Tag chip (no icon; used for the tags listed under a doc) ----
        function tagChip(tag){
            return '<a class="tag" href="#!tag:' + encodeURIComponent(tag) + '">'
                 + escapeHtml(tag) + '</a>';
        }

        // ---- Dictionary-index entry: term, dot leader, usage count ----
        function tagIndexEntry(tag, count, rank){
            var cls = 'idx-entry' + (rank ? ' top-' + rank : '');
            return '<a class="' + cls + '" href="#!tag:' + encodeURIComponent(tag) + '">'
                 + '<span class="idx-term">' + escapeHtml(tag) + '</span>'
                 + '<span class="idx-dots"></span>'
                 + '<span class="idx-count">' + count + '</span>'
                 + '</a>';
        }

        // The ten most-used tags, each given a distinct rank 1..10 so the
        // index can grade its emphasis by rank. Sorted by usage count, with
        // ties broken by name so the ordering is stable and reproducible.
        function topTagRanks(){
            var arr = Object.keys(TAG_INDEX).map(function(t){
                return { tag: t, n: TAG_INDEX[t].length };
            });
            arr.sort(function(a, b){
                if(b.n !== a.n){ return b.n - a.n; }
                return a.tag.toLowerCase().localeCompare(b.tag.toLowerCase(), 'ko');
            });
            var ranks = {};
            for(var i = 0; i < arr.length && i < 10; i++){
                ranks[arr[i].tag] = i + 1;
            }
            return ranks;
        }

        // ---- Article helpers ----
        function setArticle(html){
            var art = document.querySelector('article');
            art.innerHTML = html;
            // Clear any authoring-model badge left over from a previous doc;
            // only real doc bodies (via fetchPage) should carry it.
            document.querySelectorAll('#article .doc-model').forEach(function(el){ el.remove(); });
            // Only the content pane resets; the sidebar and masthead stay put.
            var scroller = document.getElementById('content-scroll');
            if(scroller){ scroller.scrollTop = 0; }
            window.scrollTo(0, 0);   // mobile still scrolls the page itself
            // Re-trigger the gentle fade-up animation on each navigation.
            art.classList.remove('fade-in');
            void art.offsetWidth;   // force reflow so the animation restarts
            art.classList.add('fade-in');
            initCarousels(art);
        }

        // Carousels arrive via innerHTML, so their wiring lives here.
        function initCarousels(root){
            root.querySelectorAll('.carousel').forEach(function(car){
                var scns = Array.prototype.slice.call(car.querySelectorAll('.scn'));
                var dots = Array.prototype.slice.call(car.querySelectorAll('.carousel-dots button'));
                var stage = car.querySelector('.carousel-stage');
                var label = car.querySelector('.carousel-nav .cn-label');
                var prev = car.querySelector('.carousel-nav .prev');
                var next = car.querySelector('.carousel-nav .next');
                if(!scns.length){ return; }
                var idx = 0;
                function show(i){
                    idx = (i + scns.length) % scns.length;
                    scns.forEach(function(s, k){ s.classList.toggle('active', k === idx); });
                    dots.forEach(function(d, k){ d.classList.toggle('active', k === idx); });
                    if(label){ label.textContent = (idx + 1) + ' / ' + scns.length; }
                    if(stage){ stage.scrollTop = 0; }   // each panel starts at its top
                }
                dots.forEach(function(d, k){
                    d.addEventListener('click', function(){ show(k); });
                });
                if(prev){ prev.addEventListener('click', function(){ show(idx - 1); }); }
                if(next){ next.addEventListener('click', function(){ show(idx + 1); }); }
                show(0);
            });
        }

        function renderDocTags(tags){
            var html = '<div class="doc-tags"><span class="doc-tags-label">Tags</span>';
            tags.forEach(function(t){ html += tagChip(t); });
            html += '</div>';
            return html;
        }

        function fetchPage(filename){
            fetch(filename).then(function(response){
                response.text().then(function(text){
                    var doc = DOC_BY_NAME[filename];
                    if(doc && doc.tags.length){
                        text += renderDocTags(doc.tags);
                    }
                    setArticle(text);
                    // Pin the authoring-model badge to the content pane's right edge.
                    var art = document.getElementById('article');
                    var label = (doc && doc.model) || DOC_MODEL;
                    if(art && label){
                        var span = document.createElement('span');
                        span.className = 'doc-model';
                        span.textContent = label;
                        art.appendChild(span);
                    }
                })
            })
        }

        // ---- Tag index (all tags) with instant search ----
        function showTagIndex(){
            var html = '<h2>Tags</h2>'
                     + '<input id="tag-search" type="search" placeholder="Search tags..."'
                     + ' oninput="filterTags(this.value)" autocomplete="off">'
                     + '<div id="tag-top"></div>'
                     + '<div id="tag-cloud"></div>';
            setArticle(html);
            renderTopTags();
            filterTags('');
            var box = document.getElementById('tag-search');
            if(box){ box.focus(); }
        }

        // Highlighted band of the most-used tags, ordered by the top-10
        // ranking and showing only the tag words. Top-3 keep medal colors.
        function renderTopTags(){
            var ranks = topTagRanks();
            var ranked = Object.keys(ranks);
            var el = document.getElementById('tag-top');
            if(!el){ return; }
            if(!ranked.length){ el.innerHTML = ''; return; }
            ranked.sort(function(a, b){ return ranks[a] - ranks[b]; });
            var html = '<h3 class="idx-top-title">많이 쓰인 태그</h3>'
                     + '<ol class="idx-top-list">';
            ranked.forEach(function(t){
                html += '<li><a class="idx-top-item top-' + ranks[t] + '"'
                     +  ' href="#!tag:' + encodeURIComponent(t) + '">'
                     +  escapeHtml(t)
                     +  '</a></li>';
            });
            html += '</ol>';
            el.innerHTML = html;
        }

        // Initial-letter buckets for the index. English tags group under
        // A-Z; Korean tags group under their leading consonant (초성), with
        // the doubled consonants folded onto their base (ㄲ→ㄱ, ㅃ→ㅂ, ...).
        var HANGUL_CHO = ['ㄱ','ㄱ','ㄴ','ㄷ','ㄷ','ㄹ','ㅁ','ㅂ','ㅂ','ㅅ',
                          'ㅅ','ㅇ','ㅈ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        var CHO_ORDER = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ',
                         'ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        function tagInitial(tag){
            var ch = tag.charAt(0);
            var code = ch.charCodeAt(0);
            if(code >= 0xAC00 && code <= 0xD7A3){   // a composed Hangul syllable
                return HANGUL_CHO[Math.floor((code - 0xAC00) / 588)];
            }
            var up = ch.toUpperCase();
            return (up >= 'A' && up <= 'Z') ? up : '#';
        }
        // Order buckets as A-Z first, then the Korean consonants, then '#'.
        function initialRank(k){
            if(k >= 'A' && k <= 'Z'){ return [0, k.charCodeAt(0)]; }
            var ci = CHO_ORDER.indexOf(k);
            return ci >= 0 ? [1, ci] : [2, 0];
        }

        // Group the (optionally filtered) tags by initial and lay them out
        // like the index at the back of a dictionary. The top-10 usage ranks
        // still drive the emphasis on each entry.
        function filterTags(query){
            var q = query.trim().toLowerCase();
            var tags = Object.keys(TAG_INDEX).sort(function(a, b){
                return a.toLowerCase().localeCompare(b.toLowerCase(), 'ko');
            });
            var ranks = topTagRanks();
            var groups = {}, letters = [];
            tags.forEach(function(t){
                if(q && t.toLowerCase().indexOf(q) === -1){ return; }
                var k = tagInitial(t);
                if(!groups[k]){ groups[k] = []; letters.push(k); }
                groups[k].push(t);
            });
            letters.sort(function(a, b){
                var ra = initialRank(a), rb = initialRank(b);
                return ra[0] - rb[0] || ra[1] - rb[1];
            });
            var html = '';
            letters.forEach(function(k){
                html += '<section class="idx-group">'
                     +  '<h3 class="idx-letter">' + escapeHtml(k) + '</h3>'
                     +  '<div class="idx-list">';
                groups[k].forEach(function(t){
                    html += tagIndexEntry(t, TAG_INDEX[t].length, ranks[t]);
                });
                html += '</div></section>';
            });
            if(!html){ html = '<p class="empty">No matching tags.</p>'; }
            var cloud = document.getElementById('tag-cloud');
            if(cloud){ cloud.innerHTML = html; }
            // The "most used" band belongs to the full index, not a search.
            var top = document.getElementById('tag-top');
            if(top){ top.style.display = q ? 'none' : ''; }
        }

        // ---- Docs for a single tag ----
        function showTag(tag){
            var docs = TAG_INDEX[tag] || [];
            var html = '<h2>' + escapeHtml(tag) + '</h2>'
                     + '<p class="tag-back"><a href="#!tags">&larr; All tags</a></p>'
                     + '<ul class="more-list">';
            docs.forEach(function(d){
                html += '<li><a href="#!' + d.name + '">'
                     +  '<span class="more-name">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="more-meta">' + escapeHtml(d.section) + '</span></a></li>';
            });
            html += '</ul>';
            setArticle(html);
        }

        // ---- Folder digest: every direct doc of a folder on one page ----
        // Fetches the folder's docs in reading order and concatenates their
        // bodies, with a jump-to table of contents. No tags / model badge.
        function showFolder(section){
            var docs = FOLDER_DOCS[section] || [];
            var parts = section.split(' · ');
            var title = parts[parts.length - 1] || section;
            if(!docs.length){
                setArticle('<h2>' + escapeHtml(title) + '</h2>'
                         + '<p class="empty">이 폴더에는 모아 볼 문서가 없습니다.</p>');
                return;
            }
            var toc = '<div class="folder-head">'
                    + '<h2>' + escapeHtml(title) + '</h2>'
                    + '<p class="folder-sub">' + escapeHtml(section)
                    + ' · 문서 ' + docs.length + '개</p>'
                    + '<ol class="folder-toc">';
            docs.forEach(function(d, i){
                // Buttons (not #anchors) so jumping doesn't trigger the router.
                toc += '<li><button type="button" class="folder-toc-link"'
                     + ' onclick="scrollFolderDoc(' + i + ')">'
                     + escapeHtml(d.label) + '</button></li>';
            });
            toc += '</ol></div>';
            setArticle(toc + '<div class="folder-body"><p class="empty">불러오는 중…</p></div>');
            Promise.all(docs.map(function(d){
                return fetch(d.name).then(function(r){ return r.ok ? r.text() : ''; })
                                    .catch(function(){ return ''; });
            })).then(function(texts){
                var html = '';
                docs.forEach(function(d, i){
                    // Each doc already opens with its own heading, so no extra
                    // numbered title here (it would duplicate). The section id
                    // still anchors the table-of-contents jump.
                    html += '<section class="folder-doc" id="folder-doc-' + i + '">'
                         +  texts[i]
                         +  '</section>';
                });
                var body = document.querySelector('.folder-body');
                if(body){ body.innerHTML = html; initCarousels(body); }
            });
        }

        // Smooth-scroll a folder-digest section into view (works whether the
        // scroller is #content-scroll or the window).
        function scrollFolderDoc(i){
            var el = document.getElementById('folder-doc-' + i);
            if(el){ el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        }

        // ---- Unified search screen (landing page & title click) ----
        // Full-text index over the doc bodies, built lazily in the background
        // the first time the search screen opens.
        var DOC_TEXT = {};        // name -> lowercased plain-text body (matching)
        var DOC_TEXT_RAW = {};    // name -> plain-text body, original case (snippets)
        var TEXT_INDEX_READY = false;
        var textIndexStarted = false;

        // Work Log entries are dev journal, not reference content — keep them
        // out of the unified search (results and the body index alike).
        function isSearchableDoc(d){
            return d.section.indexOf('Work Log') !== 0;
        }

        // Turn a doc's HTML into searchable plain text. Bodies carry only
        // inline SVG (no external <img>), so a detached element is safe and
        // its textContent also captures diagram labels.
        function stripHtml(html){
            var d = document.createElement('div');
            d.innerHTML = html;
            return (d.textContent || '').replace(/\s+/g, ' ').trim();
        }

        function buildTextIndex(){
            return Promise.all(DOCS.filter(isSearchableDoc).map(function(d){
                return fetch(d.name).then(function(r){
                    return r.ok ? r.text() : '';
                }).then(function(t){
                    var txt = stripHtml(t);
                    DOC_TEXT_RAW[d.name] = txt;
                    DOC_TEXT[d.name] = txt.toLowerCase();
                }).catch(function(){});
            })).then(function(){
                TEXT_INDEX_READY = true;
                // Re-run the current query now that bodies are searchable.
                var box = document.getElementById('search-input');
                if(box && box.value.trim()){ renderSearchResults(box.value); }
            });
        }

        function ensureTextIndex(){
            if(textIndexStarted){ return; }
            textIndexStarted = true;
            buildTextIndex();
        }

        // Matches every whitespace-separated term against a doc's label, its
        // section path, tags, AND its full body text (once indexed).
        function searchDocs(query){
            var q = query.trim().toLowerCase();
            if(!q){ return []; }
            var terms = q.split(/\s+/);
            return DOCS.filter(function(d){
                if(!isSearchableDoc(d)){ return false; }
                var hay = (d.label + ' ' + d.section + ' ' + d.tags.join(' ')).toLowerCase()
                        + ' ' + (DOC_TEXT[d.name] || '');
                return terms.every(function(t){ return hay.indexOf(t) !== -1; });
            });
        }

        // Wrap each search term in <mark>, matching against the RAW text (so
        // terms like "amp"/"lt" don't hit HTML entities), then escape each
        // segment. Case-insensitive; overlapping matches merged.
        function highlightTerms(text, terms){
            var lower = text.toLowerCase(), ranges = [];
            terms.forEach(function(t){
                if(!t){ return; }
                t = t.toLowerCase();
                var i = 0, p;
                while((p = lower.indexOf(t, i)) !== -1){ ranges.push([p, p + t.length]); i = p + t.length; }
            });
            if(!ranges.length){ return escapeHtml(text); }
            ranges.sort(function(a, b){ return a[0] - b[0]; });
            var merged = [];
            ranges.forEach(function(r){
                var last = merged[merged.length - 1];
                if(last && r[0] <= last[1]){ last[1] = Math.max(last[1], r[1]); }
                else { merged.push(r.slice()); }
            });
            var out = '', pos = 0;
            merged.forEach(function(r){
                out += escapeHtml(text.slice(pos, r[0]))
                     + '<mark>' + escapeHtml(text.slice(r[0], r[1])) + '</mark>';
                pos = r[1];
            });
            return out + escapeHtml(text.slice(pos));
        }

        // A short body excerpt around the first matching term, highlighted.
        // Empty when the match was only in the label/section/tags.
        function makeSnippet(name, terms){
            var low = DOC_TEXT[name], raw = DOC_TEXT_RAW[name];
            if(!low || !raw){ return ''; }
            var pos = -1;
            terms.forEach(function(t){
                var p = t ? low.indexOf(t) : -1;
                if(p !== -1 && (pos === -1 || p < pos)){ pos = p; }
            });
            if(pos === -1){ return ''; }
            var start = Math.max(0, pos - 40);
            var end = Math.min(raw.length, pos + 80);
            return (start > 0 ? '…' : '') + highlightTerms(raw.slice(start, end), terms)
                 + (end < raw.length ? '…' : '');
        }

        var SEARCH_LIMIT = 8;
        function renderSearchResults(query){
            var box = document.getElementById('search-results');
            if(!box){ return; }
            var q = query.trim();
            if(!q){ box.innerHTML = ''; box.classList.remove('open'); return; }
            var terms = q.toLowerCase().split(/\s+/);
            var docs = searchDocs(query);
            var indexing = !TEXT_INDEX_READY
                         ? '<p class="search-indexing">본문 색인을 불러오는 중… (제목·태그 우선)</p>' : '';
            if(!docs.length){
                box.innerHTML = '<p class="search-empty">&ldquo;' + escapeHtml(q)
                              + '&rdquo;에 대한 결과가 없습니다.</p>' + indexing;
                box.classList.add('open');
                return;
            }
            var html = '';
            docs.slice(0, SEARCH_LIMIT).forEach(function(d){
                html += '<a class="search-hit" href="#!' + d.name + '">'

        // A calm, decorative Breakout: a ball ricochets off the walls and the
        // search box (the "paddle"), knocking out faint bricks that respawn
        // when cleared. Self-terminates once its canvas leaves the DOM (i.e.
        // when you navigate away), so no loop leaks. Skipped for reduced motion.
        function startSearchGame(){
            if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){ return; }
            var canvas = document.querySelector('.search-game');
            if(!canvas || !canvas.getContext){ return; }
            var ctx = canvas.getContext('2d');
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var W = 0, H = 0, bricks = [], ball, trail = [];

            function accent(){
                return (getComputedStyle(document.body).getPropertyValue('--accent') || '#ff6600').trim();
            }
            function layoutBricks(){
                bricks = [];
                var cols = Math.max(6, Math.floor(W / 96));
                var rows = 3, pad = 12;
                var bw = (W - pad * (cols + 1)) / cols, bh = 15;
                var top = Math.max(46, H * 0.13);
                for(var r = 0; r < rows; r++){
                    for(var c = 0; c < cols; c++){
                        bricks.push({ x: pad + c * (bw + pad), y: top + r * (bh + pad),
                                      w: bw, h: bh, alive: true, flash: 0 });
                    }
                }
            }
            function resetBall(){
                var sp = Math.max(2.4, W / 520);
                var dir = Math.random() < 0.5 ? -1 : 1;
                ball = { x: W / 2, y: H * 0.62, vx: sp * 0.8 * dir, vy: -sp, r: Math.max(5, W / 240) };
            }
            function resize(){
                var rect = canvas.parentNode.getBoundingClientRect();
                W = rect.width; H = rect.height;
                canvas.width = W * dpr; canvas.height = H * dpr;
                canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                layoutBricks();
                if(!ball || ball.x > W || ball.y > H){ resetBall(); }
            }
            // Reflect the ball out of an axis-aligned rect; returns true on hit.
            function bounce(rx, ry, rw, rh){
                if(ball.x + ball.r < rx || ball.x - ball.r > rx + rw ||
                   ball.y + ball.r < ry || ball.y - ball.r > ry + rh){ return false; }
                var overL = (ball.x + ball.r) - rx, overR = (rx + rw) - (ball.x - ball.r);
                var overT = (ball.y + ball.r) - ry, overB = (ry + rh) - (ball.y - ball.r);
                var minX = Math.min(overL, overR), minY = Math.min(overT, overB);
                if(minX < minY){
                    ball.vx = overL < overR ? -Math.abs(ball.vx) : Math.abs(ball.vx);
                } else {
                    ball.vy = overT < overB ? -Math.abs(ball.vy) : Math.abs(ball.vy);
                }
                return true;
            }
            resize();
            resetBall();
            window.addEventListener('resize', resize);

            function frame(){
                if(!canvas.isConnected){ window.removeEventListener('resize', resize); return; }
                ctx.clearRect(0, 0, W, H);
                var col = accent();

                ball.x += ball.vx; ball.y += ball.vy;
                if(ball.x - ball.r < 0){ ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
                if(ball.x + ball.r > W){ ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
                if(ball.y - ball.r < 0){ ball.y = ball.r; ball.vy = Math.abs(ball.vy); }
                if(ball.y + ball.r > H){ ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy); }

                // The search field is the paddle.
                var field = document.querySelector('.search-field');
                if(field){
                    var cr = canvas.getBoundingClientRect(), fr = field.getBoundingClientRect();
                    bounce(fr.left - cr.left, fr.top - cr.top, fr.width, fr.height);
                }

                var anyAlive = false;
                for(var i = 0; i < bricks.length; i++){
                    var b = bricks[i];
                    if(b.flash > 0){ b.flash -= 0.06; }
                    if(b.alive){
                        anyAlive = true;
                        if(bounce(b.x, b.y, b.w, b.h)){ b.alive = false; b.flash = 1; }
                    }
                    if(b.alive || b.flash > 0){
                        ctx.globalAlpha = b.alive ? 0.15 : Math.max(0, b.flash) * 0.4;
                        ctx.fillStyle = col;
                        var pop = b.alive ? 0 : (1 - b.flash) * 4;
                        roundRect(ctx, b.x - pop, b.y - pop, b.w + pop * 2, b.h + pop * 2, 4);
                        ctx.fill();
                    }
                }
                if(!anyAlive){ layoutBricks(); }

                // Trail + ball.
                trail.push({ x: ball.x, y: ball.y });
                if(trail.length > 12){ trail.shift(); }
                for(var t = 0; t < trail.length; t++){
                    ctx.globalAlpha = (t / trail.length) * 0.22;
                    ctx.fillStyle = col;
                    ctx.beginPath();
                    ctx.arc(trail[t].x, trail[t].y, ball.r * (0.4 + 0.5 * t / trail.length), 0, 6.2832);
                    ctx.fill();
                }
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = col;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, 6.2832);
                ctx.fill();
                ctx.globalAlpha = 1;

                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }
        function roundRect(ctx, x, y, w, h, r){
            r = Math.min(r, w / 2, h / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // ---- "Recent docs" module: paginated board ----
        // Ordered by each doc's last commit date, fetched from the GitHub
        // API (cached for an hour). Until dates arrive, list order shows.
        var MORE_PAGE_SIZE = 5;
        var MORE_BLOCK = 7;    // page numbers shown per pager block (fits mobile width)
        var morePage = 0;
        var REPO_API = 'https://api.github.com/repos/dewytear/dewytear.github.io';
        var DOC_DATES_KEY = 'wikiDocDates.v1';

        function morePageCount(){
            return Math.max(1, Math.ceil(DOCS.length / MORE_PAGE_SIZE));
        }

        function renderMore(){
            var pages = morePageCount();
            if(morePage >= pages){ morePage = pages - 1; }
            var start = morePage * MORE_PAGE_SIZE;
            var html = '<h3 class="more-title">최근 문서</h3><ul class="more-list">';
            DOCS.slice(start, start + MORE_PAGE_SIZE).forEach(function(d){
                var meta = d.section + (d.date ? ' · ' + d.date.slice(0, 10) : '');
                html += '<li><a href="#!' + d.name + '">'
                     +  '<span class="more-name">' + escapeHtml(d.label) + '</span>'
                     +  '<span class="more-meta">' + escapeHtml(meta) + '</span></a></li>';
            });
            html += '</ul>';
            if(pages > 1){
                // Numbered pager: seven pages per block, with side arrows that
                // jump a whole seven-page block at a time.
                var block = Math.floor(morePage / MORE_BLOCK);
                var first = block * MORE_BLOCK;
                var last = Math.min(first + MORE_BLOCK, pages);
                html += '<div class="more-nav">'
                     +  '<button class="more-arrow" onclick="moreBlock(-1)"'
                     +      (block === 0 ? ' disabled' : '') + ' aria-label="이전 7페이지">&laquo;</button>'
                     +  '<span class="more-pages">';
                for(var i = first; i < last; i++){
                    html += '<button class="more-page' + (i === morePage ? ' active' : '') + '"'
                         +  ' onclick="moreGoto(' + i + ')">' + (i + 1) + '</button>';
                }
                html += '</span>'
                     +  '<button class="more-arrow" onclick="moreBlock(1)"'
                     +      (last >= pages ? ' disabled' : '') + ' aria-label="다음 7페이지">&raquo;</button>'
                     +  '</div>';
            }
            return html;
        }

        function moreGoto(page){
            var pages = morePageCount();
            morePage = Math.max(0, Math.min(page, pages - 1));
            document.querySelector('#more').innerHTML = renderMore();
        }

        // Jump forward/back a full seven-page block, landing on its first page.
        function moreBlock(dir){
            var pages = morePageCount();
            var maxBlock = Math.floor((pages - 1) / MORE_BLOCK);
            var block = Math.floor(morePage / MORE_BLOCK) + dir;
            block = Math.max(0, Math.min(block, maxBlock));
            morePage = block * MORE_BLOCK;
            document.querySelector('#more').innerHTML = renderMore();
        }

        function loadCachedDocDates(){
            try{
                var s = JSON.parse(localStorage.getItem(DOC_DATES_KEY));
                if(s && Date.now() - s.at < 3600000){ return s.dates; }
            }catch(e){}
            return null;
        }

        function fetchDocDates(){
            var dates = {};
            return Promise.all(DOCS.map(function(d){
                var url = REPO_API + '/commits?path=' + encodeURIComponent(d.name) + '&per_page=1';
                return fetch(url).then(function(r){
                    return r.ok ? r.json() : null;
                }).then(function(j){
                    if(j && j[0]){ dates[d.name] = j[0].commit.committer.date; }
                }).catch(function(){});
            })).then(function(){
                if(Object.keys(dates).length){
                    try{
                        localStorage.setItem(DOC_DATES_KEY,
                            JSON.stringify({ at: Date.now(), dates: dates }));
                    }catch(e){}
                }
                return dates;
            });
        }

        function applyDocDates(dates){
            if(!dates || !Object.keys(dates).length){ return; }
            DOCS.forEach(function(d){ d.date = dates[d.name] || ''; });
            DOCS.sort(function(a, b){
                return a.date < b.date ? 1 : a.date > b.date ? -1 : 0;
            });
            morePage = 0;   // reordering restarts the board at page one
            document.querySelector('#more').innerHTML = renderMore();
        }

        function refreshRecentDocs(){
            var cached = loadCachedDocDates();
            if(cached){ applyDocDates(cached); }
            else { fetchDocDates().then(applyDocDates); }
        }

        // ---- Category transfer list (전체 ↔ 노출) ----
        function catSelect(li){ li.classList.toggle('sel'); }
        function renderCatTransfer(){
            var L = document.getElementById('cat-left'), R = document.getElementById('cat-right');
            if(!L || !R || !SETTINGS_CATS){ return; }
            L.innerHTML = SETTINGS_CATS.all.map(function(c){
                var on = SETTINGS_CATS.exposed.indexOf(c) !== -1;   // already exposed
                return '<li class="cat-item' + (on ? ' on' : '') + '" data-cat="'
                     + escapeHtml(c) + '" onclick="catSelect(this)">' + escapeHtml(c) + '</li>';
            }).join('');
            R.innerHTML = SETTINGS_CATS.exposed.map(function(c){
                return '<li class="cat-item" data-cat="' + escapeHtml(c)
                     + '" onclick="catSelect(this)">' + escapeHtml(c) + '</li>';
            }).join('');
        }
        function catMove(dir){
            if(!SETTINGS_CATS){ return; }
            var side = dir > 0 ? 'cat-left' : 'cat-right';
            var sel = [].map.call(document.querySelectorAll('#' + side + ' .cat-item.sel'),
                                  function(li){ return li.getAttribute('data-cat'); });
            if(dir > 0){
                sel.forEach(function(c){
                    if(SETTINGS_CATS.exposed.indexOf(c) === -1){ SETTINGS_CATS.exposed.push(c); }
                });
                // keep exposed in the original category order
                SETTINGS_CATS.exposed = SETTINGS_CATS.all.filter(function(c){
                    return SETTINGS_CATS.exposed.indexOf(c) !== -1;
                });
            } else {
                SETTINGS_CATS.exposed = SETTINGS_CATS.exposed.filter(function(c){
                    return sel.indexOf(c) === -1;
                });
            }
            renderCatTransfer();
            persistCats();   // apply + save live
        }
        function persistCats(){
            if(!SETTINGS_CATS){ return; }
            var s = loadSettings();
            s.hiddenCats = SETTINGS_CATS.all.filter(function(c){
                return SETTINGS_CATS.exposed.indexOf(c) === -1;
            });
            saveSettings(s);
            applyCategoryVisibility(s.hiddenCats);
        }

        function settingsMsg(text, isError){
            var el = document.getElementById('settings-msg');
            if(!el){ return; }
            el.textContent = text;
            el.hidden = false;
            el.classList.toggle('error', !!isError);
        }

        function saveSettingsForm(){
            var s = loadSettings();
            // Empty title = no override → fall back to config/default (so the
            // shown value matches the applied value on reopen).
            var titleVal = document.getElementById('settings-title').value.trim();
            if(titleVal){ s.title = titleVal; } else { delete s.title; }
            s.tagline = document.getElementById('settings-tagline').value;
            s.photoLine = document.getElementById('settings-photoline').value;
            s.music = document.getElementById('settings-music').value.trim();
            s.navLineStyle = document.getElementById('settings-navstyle').value;
            s.navLineWidth = document.getElementById('settings-navwidth').value;
            s.hideRecent = document.getElementById('settings-hiderecent').checked;
            if(SETTINGS_CATS){
                s.hiddenCats = SETTINGS_CATS.all.filter(function(c){
                    return SETTINGS_CATS.exposed.indexOf(c) === -1;
                });
            }
            var np = document.getElementById('settings-newpass').value;
            if(np){ s.password = np; }
            try{
                saveSettings(s);
                applySettings();
                if(window.setMusicVideo){ window.setMusicVideo(s.music); }
                document.getElementById('settings-newpass').value = '';
                settingsMsg(np ? '저장되었습니다. 암호가 변경되었습니다.' : '저장되었습니다.');
            }catch(e){
                settingsMsg('저장에 실패했습니다.', true);
            }
        }

        function resetSettings(){
            if(!window.confirm('타이틀·암호를 모두 기본값으로 되돌릴까요?')){ return; }
            localStorage.removeItem(SETTINGS_KEY);
            SETTINGS_UNLOCKED = false;
            location.reload();
        }

        // Mark the nav link for the doc on screen (null clears every mark).
        function markActiveNav(name){
            var nav = document.getElementById('navigation');
            if(!nav){ return; }
            var want = name ? '#!' + name : null;
            nav.querySelectorAll('.nav-branch.on-path').forEach(function(li){
                li.classList.remove('on-path');
            });
            nav.querySelectorAll('a').forEach(function(a){
                var active = a.getAttribute('href') === want;
                a.classList.toggle('nav-active', active);
                if(active){
                    // Light up the guide rails along the active doc's ancestry.
                    var li = a.closest('.nav-branch');
                    while(li){ li.classList.add('on-path'); li = li.parentNode.closest('.nav-branch'); }
                }
            });
        }

        // ---- Router ----
        function route(){
            document.body.classList.remove('nav-open');   // close mobile drawer
            var h = location.hash;
            var path = h ? h.substr(2) : '';               // strip "#!"
            // Hide the "recent docs" module on the settings, tags and search screens.
            document.body.classList.toggle('settings-view', path === 'settings');
            document.body.classList.toggle('tags-view', path === 'tags');
            // The unified search screen is both the landing page (empty hash)
            // and the destination of the masthead title link (#!search).
            var isSearch = !h || path === 'search';
            document.body.classList.toggle('search-view', isSearch);
            document.body.classList.toggle('folder-view', path.indexOf('folder:') === 0);
            if(isSearch){ showSearch(); markActiveNav(null); return; }
            if(path === 'tags'){ showTagIndex(); markActiveNav(null); }
            else if(path.indexOf('tag:') === 0){ showTag(decodeURIComponent(path.substr(4))); markActiveNav(null); }
            else if(path.indexOf('folder:') === 0){ showFolder(decodeURIComponent(path.substr(7))); markActiveNav(null); }
            else if(path === 'settings'){ openSettings(); markActiveNav(null); }
            else { fetchPage(path); markActiveNav(path); }
        }

        function toggleNav(){
            document.body.classList.toggle('nav-open');
        }

        function toggleBranch(btn){
            btn.parentNode.classList.toggle('collapsed');
        }

        function setAllBranches(collapsed){
            document.querySelectorAll('#navigation .nav-branch').forEach(function(li){
                li.classList.toggle('collapsed', collapsed);
            });
        }
        function expandAll(){ setAllBranches(false); }
        function collapseAll(){ setAllBranches(true); }

        // ---- Boot ----
        window.addEventListener('hashchange', route);
        // Repo config is the global source; local (localStorage) tweaks win on top.
        applyRepoConfig().then(applySettings);

        fetch('list').then(function(response){
            response.json().then(function(tree){
                buildIndexes(tree);
                document.querySelector('#navigation').innerHTML =
                    '<div class="nav-tools">'
                  + '<button type="button" class="nav-tool" onclick="expandAll()">모두 펼치기</button>'
                  + '<button type="button" class="nav-tool" onclick="collapseAll()">모두 접기</button>'
                  + '</div>'
                  + renderNodes(tree, []);
                applyCategoryVisibility(loadSettings().hiddenCats);   // nav now exists
                document.querySelector('#more').innerHTML = renderMore();
                refreshRecentDocs();   // reorder by last-modified once dates load
                route();   // render the initial page once indexes exist
            })
        })

        // Accept a YouTube URL (watch / youtu.be / embed / shorts) or a raw
        // 11-char video id; return the id, or '' if it doesn't look like one.
        function parseYouTubeId(input){
            input = (input || '').trim();
            if(!input){ return ''; }
            var m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
            if(m){ return m[1]; }
            if(/^[A-Za-z0-9_-]{11}$/.test(input)){ return input; }
            return '';
        }

        // ---- Floating background music (YouTube IFrame API) ----
        (function(){
            var DEFAULT_ID = '08A9n8QyE3k';
            function resolveId(){
                try{ return parseYouTubeId((loadSettings().music) || '') || DEFAULT_ID; }
                catch(e){ return DEFAULT_ID; }
            }
            var VIDEO_ID = resolveId();
            var VIDEO_URL = 'https://www.youtube.com/watch?v=' + VIDEO_ID;
            var player, ready = false, playing = false, wantPlay = false, failed = false;
            var btn = document.getElementById('music-btn');

            // If the API never loads (offline / blocked by an ad- or tracker
            // blocker), tell the user instead of leaving a dead button.
            var apiTimer = setTimeout(function(){
                if(!player){ fail('음악 로드 실패 (네트워크·차단기 확인)'); }
            }, 6000);

            var tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            tag.onerror = function(){ fail('음악 로드 실패 (네트워크·차단기 확인)'); };
            document.head.appendChild(tag);

            window.onYouTubeIframeAPIReady = function(){
                clearTimeout(apiTimer);
                player = new YT.Player('yt-music', {
                    // Real (off-screen) size — Safari refuses playback on a
                    // zero-size/hidden media element even after a user tap.
                    height: '200', width: '200', videoId: VIDEO_ID,
                    playerVars: { autoplay: 0, controls: 0, loop: 1,
                                  playlist: VIDEO_ID, playsinline: 1,
                                  origin: location.origin },
                    events: {
                        onReady: function(){
                            ready = true;
                            try{ player.setVolume(35); }catch(e){}
                            // Fallback for a tap that arrived before the player
                            // object even existed (see toggleMusic).
                            if(wantPlay){ start(); }
                        },
                        onStateChange: function(e){
                            playing = (e.data === YT.PlayerState.PLAYING);
                            if(playing){ failed = false; }
                            render();
                        },
                        onError: function(){
                            // 2=bad id · 5=HTML5 error · 100=removed ·
                            // 101/150=embedding disabled by the uploader.
                            fail('이 영상은 재생할 수 없습니다 (임베드 제한)');
                        }
                    }
                });
            };
            function start(){
                try{ player.playVideo(); player.setVolume(35); }catch(e){}
            }
            function fail(msg){
                failed = true; playing = false; wantPlay = false;
                if(btn){
                    btn.classList.remove('playing'); btn.classList.add('idle', 'blocked');
                    btn.title = '재생 차단됨 — 눌러서 YouTube에서 열기';
                    btn.setAttribute('aria-label', btn.title);
                }
                showMusicNote();
                try{ console.warn('[music] ' + msg); }catch(e){}
            }
            // A one-time bubble explaining the block (usually Safari's tracker
            // prevention on youtube.com) and pointing to the YouTube fallback.
            function showMusicNote(){
                if(document.getElementById('music-note')){ return; }
                var n = document.createElement('div');
                n.id = 'music-note';
                n.innerHTML = '배경음악(YouTube)이 차단됐어요. Safari라면 '
                            + '<b>크로스 사이트 추적 방지</b> 때문일 수 있어요.<br>'
                            + '버튼을 누르면 <b>YouTube에서 열기</b> &#8599;';
                document.body.appendChild(n);
                void n.offsetWidth;
                n.classList.add('show');
                setTimeout(function(){ if(n.parentNode){ n.classList.remove('show'); } }, 9000);
                setTimeout(function(){ if(n.parentNode){ n.remove(); } }, 9400);
            }
            function render(){
                if(!btn || failed){ return; }
                btn.classList.toggle('playing', playing);
                btn.classList.toggle('idle', !playing);
                btn.setAttribute('aria-label', playing ? '배경음악 정지' : '배경음악 재생');
                btn.setAttribute('aria-pressed', playing ? 'true' : 'false');
                btn.title = playing ? '배경음악 정지' : '배경음악 재생';
            }
            window.toggleMusic = function(){
                // Blocked (e.g. Safari tracker prevention): open the track on
                // YouTube directly — this tap is a user gesture, so it's allowed.
                if(failed){
                    var note = document.getElementById('music-note');
                    if(note){ note.remove(); }
                    window.open(VIDEO_URL, '_blank', 'noopener');
                    return;
                }
                // Player object not created yet (API script still loading):
                // remember the intent; onReady will honour it.
                if(!player){
                    wantPlay = true;
                    if(btn){ btn.classList.add('playing'); btn.classList.remove('idle'); }
                    return;
                }
                failed = false;
                if(playing){ player.pauseVideo(); wantPlay = false; }
                else{
                    // Call playVideo() synchronously inside the user gesture. The
                    // YT API queues commands issued before onReady, so playback
                    // starts with sound instead of being deferred to a
                    // non-gesture callback (which browsers block).
                    start();
                }
            };
            // Settings can swap the track (a YouTube link/id). Apply live when
            // the player exists; otherwise it takes effect on the next load
            // (resolveId reads the saved setting at init).
            window.setMusicVideo = function(raw){
                var id = parseYouTubeId(raw || '') || DEFAULT_ID;
                if(id === VIDEO_ID){ return; }
                VIDEO_ID = id;
                VIDEO_URL = 'https://www.youtube.com/watch?v=' + id;
                if(player && player.cueVideoById){
                    try{
                        player.cueVideoById(id);
                        failed = false;
                        if(btn){ btn.classList.remove('blocked'); }
                    }catch(e){}
                }
            };
        })();
    </script>
</body>
</html>
